<style>
  :root {
    --bg: #070b12;
    --panel: rgba(15, 24, 36, 0.88);
    --panel-2: rgba(21, 34, 47, 0.9);
    --line: #1f3142;
    --text: #eef4f9;
    --muted: #7e93a6;
    --pitch: #2fbf71;
    --live: #ff4655;
    --gold: #e8b84b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', system-ui, sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  #bg3d { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .page { position: relative; z-index: 1; }

  /* Gold confetti (shown when opening Awards with a prize won) */
  .confetti-layer { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 9999; }
  .confetti-bit { position: absolute; top: -24px; will-change: transform, opacity; }
  @keyframes confettiFall {
    0%   { transform: translateY(-24px) rotateZ(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotateZ(720deg); opacity: 0.85; }
  }
  @keyframes confettiShimmer {
    0%, 100% { filter: brightness(0.9); }
    50%      { filter: brightness(1.9); }
  }
  @media (prefers-reduced-motion: reduce) { .confetti-layer { display: none; } }

  /* Header */
  header {
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(11,18,28,0.92) 0%, rgba(7,11,18,0.75) 100%);
    padding: calc(22px + env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right)) 18px calc(20px + env(safe-area-inset-left));
    backdrop-filter: blur(2px);
  }
  .header-inner {
    max-width: 760px; margin: 0 auto;
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  /* Home-screen (standalone) web app: iOS sometimes reports a 0 top inset, so
     guarantee enough space for the status bar / Dynamic Island. The .pwa-standalone
     class is set by a script (more reliable on iOS than the media query alone). */
  .pwa-standalone header { padding-top: max(calc(22px + env(safe-area-inset-top)), 60px); }
  @media (display-mode: standalone) {
    header { padding-top: max(calc(22px + env(safe-area-inset-top)), 60px); }
  }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 30px;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  h1 .accent { color: var(--pitch); }
  .status-row { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }
  .refresh-btn {
    background: var(--panel-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: inherit; font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 6px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .refresh-btn:hover { border-color: var(--pitch); }
  .refresh-btn:focus-visible { outline: 2px solid var(--pitch); outline-offset: 2px; }
  .auto-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
  .auto-toggle input { accent-color: var(--pitch); cursor: pointer; }

  /* Countdown */
  .countdown {
    max-width: 760px; margin: 14px auto 0; padding: 0 20px;
    text-align: center; font-size: 14px; color: var(--muted);
  }
  .countdown strong { color: var(--pitch); font-weight: 600; }
  .countdown[hidden] { display: none; }

  /* Tabs */
  .tabs {
    max-width: 760px; margin: 16px auto 0; padding: 0 20px;
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
  }
  .tab-break { display: none; }
  @media (max-width: 480px) {
    .tab-btn { padding: 7px 12px; font-size: 14px; }
    .tab-break { display: block; width: 100%; height: 0; }
  }
  .tab-btn {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    padding: 8px 16px; border-radius: 8px; cursor: pointer;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn:focus-visible { outline: 2px solid var(--pitch); outline-offset: 2px; }
  .tab-btn.active { color: var(--text); border-color: var(--pitch); background: rgba(47,191,113,0.12); }

  /* Date nav */
  .date-nav {
    max-width: 760px; margin: 18px auto 0; padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .date-nav button {
    background: var(--panel); border: 1px solid var(--line); color: var(--muted);
    font-family: inherit; font-size: 13px; padding: 6px 12px; border-radius: 6px; cursor: pointer;
  }
  .date-nav button:hover { color: var(--text); border-color: var(--pitch); }
  .date-nav button:focus-visible { outline: 2px solid var(--pitch); outline-offset: 2px; }
  .date-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--text);
  }
  .date-center { display: flex; align-items: center; gap: 8px; }
  .today-btn {
    background: var(--panel); border: 1px solid var(--line); color: var(--pitch);
    font-size: 15px; line-height: 1; width: 28px; height: 28px; border-radius: 50%;
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  }
  .today-btn:hover { border-color: var(--pitch); }
  .today-btn:focus-visible { outline: 2px solid var(--pitch); outline-offset: 2px; }
  .today-btn[hidden] { display: none; }

  /* Mini calendar */
  .cal-wrap { max-width: 760px; margin: 16px auto 0; padding: 0 20px; display: flex; justify-content: center; }
  .calendar {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px 14px; width: 100%; max-width: 340px; backdrop-filter: blur(2px);
  }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .cal-head button {
    background: none; border: none; color: var(--muted);
    font-size: 16px; cursor: pointer; padding: 2px 8px; border-radius: 4px;
  }
  .cal-head button:hover { color: var(--pitch); }
  .cal-head button:focus-visible { outline: 2px solid var(--pitch); }
  .cal-month {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
  .cal-dow {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--muted); text-transform: uppercase; padding: 4px 0;
  }
  .cal-day {
    position: relative; background: none; border: 1px solid transparent; border-radius: 6px;
    color: var(--muted); font-family: inherit; font-size: 13px; padding: 6px 0 10px; cursor: default;
  }
  .cal-day.has-games { color: var(--text); cursor: pointer; }
  .cal-day.has-games:hover { border-color: var(--pitch); }
  .cal-day.has-games:focus-visible { outline: 2px solid var(--pitch); }
  .cal-day.has-games::after {
    content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 5px; height: 5px; border-radius: 50%; background: var(--pitch);
  }
  .cal-day.fav-day::after { background: var(--gold); }
  .cal-day.today { border-color: var(--line); }
  .cal-day.out-range { opacity: 0.25; }
  .cal-day.selected {
    background: rgba(47, 191, 113, 0.18); border-color: var(--pitch); color: var(--text);
  }
  .cal-loading { font-size: 12px; color: var(--muted); text-align: center; padding: 6px 0 2px; }

  /* Comp filter */
  .comp-filter {
    max-width: 760px; margin: 16px auto 0; padding: 0 20px;
    display: flex; gap: 6px; justify-content: center;
  }
  .comp-btn {
    background: var(--panel); border: 1px solid var(--line); border-radius: 7px;
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 6px 16px; cursor: pointer;
  }
  .comp-btn:hover { color: var(--text); }
  .comp-btn:focus-visible { outline: 2px solid var(--pitch); outline-offset: 2px; }
  .comp-btn.active { color: var(--text); border-color: var(--pitch); background: rgba(47,191,113,0.12); }

  /* Final-score prediction panel */

  .pred-in {

  /* Polls */

  .poll-btn:hover { background: rgba(47,191,113,0.24); }
  .poll-btn:focus-visible { outline: 2px solid var(--pitch); outline-offset: 2px; }
  .poll-mychoice { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .poll-mychoice strong { color: var(--pitch); }
  .poll-results { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .poll-bar-row { display: flex; align-items: center; gap: 9px; font-size: 13px; }
  .poll-bar-team {
    display: flex; align-items: center; gap: 6px; width: 130px; flex-shrink: 0;

  }
  .poll-bar-team img { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
  .poll-bar-track {

  }
  .poll-bar-fill {
    display: block; height: 100%; background: linear-gradient(90deg, rgba(47,191,113,0.55), var(--pitch));
    border-radius: 4px; transition: width 0.4s ease;
  }
  .poll-bar-row.mine .poll-bar-fill { background: linear-gradient(90deg, rgba(232,184,75,0.55), var(--gold)); }
  .poll-bar-row.mine .poll-bar-team { color: var(--gold); font-weight: 600; }
  .poll-bar-n {

  .poll-lb-head:hover { background: var(--panel-2); }

  footer {

  @media (prefers-reduced-motion: reduce) {

</style>

<canvas id="bg3d" aria-hidden="true"></canvas>

<div class="page">

<header>
  <div class="header-inner">

        <input type="checkbox" id="autoRefresh" checked>
        Auto refresh

  </div>
</header>

<div class="countdown" id="countdown" hidden></div>

<div class="tabs">

  <button class="tab-btn" id="tabPolls">Polls</button>
</div>

<div id="matchesView">

  <div class="date-nav">
    <button id="prevDay"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px"><polyline points="15 18 9 12 15 6"/></svg> Previous</button>

    <button id="nextDay">Next <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>

        <span class="cal-month" id="calMonth"></span>

      </div>

      </button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const BASE_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
const SUMMARY_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=';
const STANDINGS_URL = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026';

/* Optional: paste your Google Apps Script web-app URL here to share the final
   score predictions across everyone via a Google Sheet. Leave it as '' to keep
   predictions on this device only (localStorage). */
const PREDICTIONS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxHyD4qLqQ0h_-0KGE9mt7qp9EhrhENab1rhgAcACxmC0YmZAKJJLqmt7vebVck-Yq_/exec';

const content = document.getElementById('content');
const lastUpdatedEl = document.getElementById('lastUpdated');
const autoRefreshEl = document.getElementById('autoRefresh');
const dateLabelEl = document.getElementById('dateLabel');
const countdownEl = document.getElementById('countdown');

/* ---------- Flat SVG icons ---------- */
const ICON = {
  starOutline: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2.5 15.1 8.6 22 9.6 17 14.4 18.2 21.2 12 18 5.8 21.2 7 14.4 2 9.6 8.9 8.6"/></svg>',
  starFilled: '<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2.5 15.1 8.6 22 9.6 17 14.4 18.2 21.2 12 18 5.8 21.2 7 14.4 2 9.6 8.9 8.6"/></svg>',
  ball: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true" style="vertical-align:-2px"><circle cx="12" cy="12" r="9.2"/><polygon points="12 8 15.6 10.6 14.2 14.8 9.8 14.8 8.4 10.6" fill="currentColor" stroke="none"/></svg>'
};

/* ---------- Persistence (localStorage with in-memory fallback) ---------- */
const store = (() => {
  let mem = {};
  let ok = false;
  try {
    localStorage.setItem('__t', '1'); localStorage.removeItem('__t');
    ok = true;
  } catch (e) { /* sandboxed preview — fall back to memory */ }
  return {
    get(k, d) {
      try {
        const v = ok ? localStorage.getItem(k) : mem[k];
        return v == null ? d : JSON.parse(v);
      } catch (e) { return d; }
    },
    set(k, v) {
      const s = JSON.stringify(v);
      if (ok) { try { localStorage.setItem(k, s); } catch (e) {} }
      mem[k] = s;
    }
  };
})();

/* ---------- State ---------- */
/* WC_END runs to 20 July local: the final kicks off 19 July US time, which is
   the morning of 20 July for viewers ahead of the venues (e.g. AEST). */
const WC_START = new Date(2026, 5, 11);
const WC_END = new Date(2026, 6, 20);
function clampToTournament(d) {
  if (d < WC_START) return new Date(WC_START);
  if (d > WC_END) return new Date(WC_END);
  return d;
}
let selectedDate = clampToTournament(stripTime(new Date()));
let calMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
if (calMonth < new Date(2026, 5, 1)) calMonth = new Date(2026, 5, 1);
if (calMonth > new Date(2026, 6, 1)) calMonth = new Date(2026, 6, 1);

let refreshTimer = null;
let fetching = false;
let lastData = null;
const monthEvents = {};        // 'YYYY-MM' -> { 'YYYY-MM-DD': [{teams, ids, d}, ...] }
const prevScores = {};         // eventId -> 'home:away'
const flashUntil = {};         // eventId -> timestamp
const expanded = new Set();    // eventIds with details open
const detailsCache = {};       // eventId -> html string or 'loading'
let favourites = store.get('wc26.favs', {});   // teamId -> displayName
let teamGroup = {};            // teamId -> 'A'..'L'
let standingsData = null;

/* ---------- Helpers ---------- */
function stripTime(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function sameDay(a, b) { return a.getTime() === b.getTime(); }
function yyyymmdd(d) {
  return d.getFullYear().toString() +
    String(d.getMonth() + 1).padStart(2, '0') +
    String(d.getDate()).padStart(2, '0');
}
function isoDay(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}
/* Bucket games by the viewer's LOCAL date, so the calendar dots and the day
   view match what's actually on "today" in your timezone (AEST etc.).
   ESPN's ?dates= pages are bucketed by US Eastern, so fetches use a ±1 day
   buffer and then filter events down to the local day. */
function localDay(dateIso) {
  return isoDay(new Date(dateIso));
}
function localToday() {
  return stripTime(new Date());
}
/* Host-city timezone map for showing the game's local (venue) time */
const CITY_TZ = [
  ['mexico city', 'America/Mexico_City'],
  ['guadalajara', 'America/Mexico_City'],
  ['zapopan', 'America/Mexico_City'],
  ['monterrey', 'America/Monterrey'],
  ['toronto', 'America/Toronto'],
  ['vancouver', 'America/Vancouver'],
  ['seattle', 'America/Los_Angeles'],
  ['santa clara', 'America/Los_Angeles'],
  ['san francisco', 'America/Los_Angeles'],
  ['inglewood', 'America/Los_Angeles'],
  ['los angeles', 'America/Los_Angeles'],
  ['kansas city', 'America/Chicago'],
  ['arlington', 'America/Chicago'],
  ['dallas', 'America/Chicago'],
  ['houston', 'America/Chicago'],
  ['atlanta', 'America/New_York'],
  ['miami', 'America/New_York'],
  ['east rutherford', 'America/New_York'],
  ['new york', 'America/New_York'],
  ['philadelphia', 'America/New_York'],
  ['foxborough', 'America/New_York'],
  ['boston', 'America/New_York']
];
function venueTime(iso, city) {
  if (!city) return null;
  const c = city.toLowerCase();
  const hit = CITY_TZ.find(([name]) => c.includes(name));
  if (!hit) return null;
  try {
    return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit', timeZone: hit[1] });
  } catch (e) { return null; }
}
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function fmtKickoff(iso) {
  return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}
function firstDefined(...vals) {
  return vals.find(v => v !== undefined && v !== null && v !== '');
}
function numText(v) {
  if (v === undefined || v === null || v === '') return '';
  const n = Number(v);
  return Number.isFinite(n) ? String(n) : String(v);
}
function competitorPenaltyScore(c) {
  if (!c) return '';
  return numText(firstDefined(
    c.shootoutScore, c.shootout, c.penaltyScore, c.penalties, c.penaltyShootoutScore,
    c.penaltyKickScore, c.records?.shootoutScore, c.linescores?.penalties
  ));
}
function competitionHasShootout(comp) {
  if (!comp) return false;
  if (comp.shootout === true || comp.hasShootout === true || comp.penaltyShootout === true) return true;
  const comps = comp.competitors || [];
  return comps.some(c => competitorPenaltyScore(c) !== '');
}
function shootoutSummaryHtmlFromCompetition(comp, className) {
  if (!comp || !competitionHasShootout(comp)) return '';
  const comps = (comp.competitors || []).slice().sort((a, b) => (a.homeAway === 'home' ? -1 : 1));
  const bits = comps.map(c => {
    const t = c.team || {};
    const ps = competitorPenaltyScore(c);
    if (ps === '') return '';
    return esc(t.shortDisplayName || t.abbreviation || t.displayName || t.name || 'Team') + ' ' + esc(ps);
  }).filter(Boolean);
  if (!bits.length) return '';
  if (className === 'mini') return '<span class="shootout-mini">Pens ' + bits.join(' - ') + '</span>';
  if (className === 'bracket') return '<div class="b-shootout-note">Pens ' + bits.join(' - ') + '</div>';
  return '<div class="shootout-summary"><div class="shootout-title">Penalty shootout</div>' +
    '<div class="shootout-line">' + bits.join(' &nbsp;·&nbsp; ') + '</div></div>';
}
function shootoutEventHtml(e) {
  const clock = e.clock?.displayValue || 'Pens';
  const who = (e.participants || []).map(p => p.athlete?.displayName).filter(Boolean).join(', ');
  const teamAbbr = e.team?.abbreviation || e.team?.displayName || '';
  const text = who || e.text || e.type?.text || 'Penalty shootout';
  return '<div class="detail-event">' +
    '<span class="detail-clock">' + esc(clock) + '</span>' +
    '<span class="detail-icon">⚽</span>' +
    '<span>' + esc(text) + (teamAbbr ? ' <span style="color:var(--muted)">(' + esc(teamAbbr) + ')</span>' : '') + '</span>' +
  '</div>';
}
function stageLabel(ev) {
  const slug = ev.season?.slug || '';
  const map = {
    'group-stage': 'Group', 'round-of-32': 'Round of 32', 'round-of-16': 'Round of 16',
    'quarterfinals': 'Quarter-final', 'semifinals': 'Semi-final',
    'third-place-match': '3rd place', 'final': 'Final'
  };
  return map[slug] || slug.replace(/-/g, ' ');
}

function updateDateLabel() {
  const opts = { weekday: 'short', day: 'numeric', month: 'short' };
  const isToday = sameDay(selectedDate, localToday());
  dateLabelEl.textContent = (isToday ? 'Today — ' : '') +
    selectedDate.toLocaleDateString(undefined, opts);
  document.getElementById('todayBtn').hidden = isToday;
}

/* ---------- Match rendering ---------- */

function isFavMatch(ev) {
  const comps = ev.competitions?.[0]?.competitors || [];
  return comps.some(c => favourites[c.team?.id]);
}

function teamRowHtml(c, state) {
  const t = c.team || {};
  const isWinner = state === 'post' && c.winner;
  const faved = !!favourites[t.id];
  const logo = t.logo ? '<img src="' + esc(t.logo) + '" alt="" loading="lazy">' : '<span style="width:26px"></span>';
  const score = state === 'pre' ? '' : '<span class="team-score">' + esc(c.score ?? '') + '</span>';
  return '<div class="team-row' + (isWinner ? ' winner' : '') + '">' +
    '<button class="fav-btn' + (faved ? ' faved' : '') + '" data-team-id="' + esc(t.id || '') +
      '" data-team-name="' + esc(t.displayName || '') +
      '" title="' + (faved ? 'Unstar' : 'Star') + ' ' + esc(t.displayName || 'team') + '" aria-label="' +
      (faved ? 'Unstar ' : 'Star ') + esc(t.displayName || 'team') + '">' +
      (faved ? ICON.starFilled : ICON.starOutline) + '</button>' +
    logo +
    '<span class="team-line">' +
      '<span class="team-name">' + esc(t.displayName || t.name || '?') + '</span>' +
      rankBadge(t.id) +
      sweepTagsFor(t.id).map(tag => {
        const dud = tag.role === 'dud';
        const lbl = roleLabel(tag.league, tag.role).toLowerCase();
        return '<span class="sweep-tag ' + tag.league.toLowerCase() + (dud ? ' dud' : '') +
          '" title="' + esc(tag.league) + ' ' + esc(lbl) + ' pick: ' + esc(tag.member) + '">' +
          esc(tag.member) + (dud ? ' (' + esc(lbl) + ')' : '') + '</span>';
      }).join('') +
    '</span>' +
    score +
  '</div>';
}

function badgeHtml(ev) {
  const comps = ev.competitions?.[0]?.competitors || [];
  const slug = ev.season?.slug || '';
  let text = '';
  if (slug === 'group-stage') {
    const g = comps.map(c => teamGroup[c.team?.id]).find(Boolean);
    text = g ? 'Group ' + g : 'Group stage';
  } else {
    text = stageLabel(ev);
  }
  const flashing = flashUntil[ev.id] && Date.now() < flashUntil[ev.id];
  return '<div class="badge-row">' +
    '<span class="stage-badge">' + esc(text) + '</span>' +
    (flashing ? '<span class="goal-badge">GOAL</span>' : '') +
  '</div>';
}

function matchCard(ev) {
  const comp = (ev.competitions || [])[0];
  if (!comp) return '';
  const st = comp.status || {};
  const state = st.type?.state || 'pre';
  const comps = comp.competitors || [];
  const home = comps.find(c => c.homeAway === 'home') || comps[0];
  const away = comps.find(c => c.homeAway === 'away') || comps[1];
  const venue = comp.venue ?
    (comp.venue.fullName || '') + (comp.venue.address?.city ? ', ' + comp.venue.address.city : '') : '';

  let stateHtml = '';
  if (state === 'in') {
    const clock = st.displayClock || '';
    const desc = st.type?.description || 'Live';
    stateHtml = '<span class="match-state live">' + esc(clock && clock !== "0'" ? clock : desc) + '</span>';
  } else if (state === 'post') {
    stateHtml = '<span class="match-state ft">FT</span>' + shootoutSummaryHtmlFromCompetition(comp, 'mini');
  } else {
    const vTime = venueTime(ev.date, comp.venue?.address?.city);
    stateHtml = '<span class="match-state kick">' + fmtKickoff(ev.date) + '</span>' +
      '<span class="time-label">your time</span>' +
      (vTime ? '<span class="match-venue">' + esc(vTime) + ' venue time</span>' : '');
  }

  const flashing = flashUntil[ev.id] && Date.now() < flashUntil[ev.id];
  const detailHtml = expanded.has(ev.id)
    ? '<div class="match-details">' + (detailsCache[ev.id] === 'loading'
        ? '<div class="detail-note">Loading match events…</div>'
        : (detailsCache[ev.id] || '<div class="detail-note">Loading match events…</div>')) + '</div>'
    : '';

  return '<div class="match' + (state === 'in' ? ' is-live' : '') + (flashing ? ' goal-flash' : '') +
    '" data-event-id="' + esc(ev.id) + '" role="button" tabindex="0" aria-expanded="' + expanded.has(ev.id) + '">' +
    badgeHtml(ev) +
    '<div class="match-top">' +
      '<div class="teams">' + teamRowHtml(home, state) + teamRowHtml(away, state) + '</div>' +
      '<div class="match-meta">' + stateHtml +
        (venue ? '<span class="match-venue">' + esc(venue) + '</span>' : '') +
      '</div>' +
    '</div>' +
    detailHtml +
  '</div>';
}

function matchesSearch(ev, q) {
  const comps = ev.competitions?.[0]?.competitors || [];
  if (!matchesMemberFilter(comps)) return false;
  if (!q) return true;
  const teamHit = comps.some(c => {
    const t = c.team || {};
    return [t.displayName, t.shortDisplayName, t.name, t.abbreviation, t.location]
      .filter(Boolean)
      .some(v => v.toLowerCase().includes(q));
  });
  if (teamHit) return true;
  // Also match sweep member names — searching "Dave" finds Dave's teams' games
  const members = sweepMemberStrings();
  return Object.keys(members).some(name =>
    name.includes(q) && comps.some(c => members[name].has(c.team?.id)));
}

function favFirst(arr) {
  return arr.slice().sort((a, b) => (isFavMatch(b) ? 1 : 0) - (isFavMatch(a) ? 1 : 0));
}

function render(data) {
  const q = document.getElementById('teamSearch').value.trim().toLowerCase();
  const all = data.events || [];
  const events = all.filter(ev => matchesSearch(ev, q));

  if (!all.length) {
    content.innerHTML = '<div class="empty">No matches scheduled for this day.</div>';
    return false;
  }
  if (!events.length) {
    const whoWhat = memberFilter && !q ? esc(memberFilter) + '&rsquo;s teams' : '&ldquo;' + esc(q) + '&rdquo;';
    content.innerHTML = '<div class="empty">No matches for ' + whoWhat +
      ' on this day. Try another day with a dot on the calendar.</div>';
    return all.some(e => e.competitions?.[0]?.status?.type?.state === 'in');
  }

  const stateOf = e => e.competitions?.[0]?.status?.type?.state;
  const live = favFirst(events.filter(e => stateOf(e) === 'in'));
  const upcoming = favFirst(events.filter(e => stateOf(e) === 'pre')
    .sort((a, b) => new Date(a.date) - new Date(b.date)));
  const done = favFirst(events.filter(e => stateOf(e) === 'post'));

  let html = '';
  if (live.length) {
    html += '<div class="section-label live-label"><span class="live-dot"></span>Live now</div>';
    html += live.map(matchCard).join('');
  }
  if (upcoming.length) {
    html += '<div class="section-label">Upcoming</div>';
    html += upcoming.map(matchCard).join('');
  }
  if (done.length) {
    html += '<div class="section-label">Full time</div>';
    html += done.map(matchCard).join('');
  }
  content.innerHTML = html;
  return live.length > 0;
}

/* ---------- Goal detection, flash & notifications ---------- */

function detectGoals(data) {
  (data.events || []).forEach(ev => {
    const comp = ev.competitions?.[0];
    if (!comp) return;
    const state = comp.status?.type?.state;
    const comps = comp.competitors || [];
    const home = comps.find(c => c.homeAway === 'home') || comps[0];
    const away = comps.find(c => c.homeAway === 'away') || comps[1];
    const key = (home?.score ?? '') + ':' + (away?.score ?? '');
    const prev = prevScores[ev.id];
    prevScores[ev.id] = key;
    if (prev === undefined || prev === key) return;
    if (state !== 'in' && state !== 'post') return;

    flashUntil[ev.id] = Date.now() + 8000;
    detailsCache[ev.id] = null;   // refetch events so the new goal appears in details

  });
}

/* ---------- Match details (drill-in) ---------- */

async function loadDetails(eventId) {
  detailsCache[eventId] = 'loading';
  if (lastData) render(lastData);
  try {
    const res = await fetch(SUMMARY_URL + encodeURIComponent(eventId));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const events = data.keyEvents || [];
    const summaryComp = data.competitions?.[0] || data.header?.competitions?.[0] || null;
    const shootoutSummary = shootoutSummaryHtmlFromCompetition(summaryComp, 'details');
    const rows = events
      .filter(e => {
        const t = ((e.type?.text || '') + ' ' + (e.text || '')).toLowerCase();
        return e.scoringPlay === true || e.redCard === true || e.yellowCard === true || e.shootout === true ||
          t.includes('goal') || t.includes('card') || t.includes('penalty') ||
          t.includes('shootout') || t.includes('shoot-out');
      })
      .map(e => {
        const t = ((e.type?.text || '') + ' ' + (e.text || '')).toLowerCase();
        const isShootout = e.shootout === true || t.includes('shootout') || t.includes('shoot-out');
        if (isShootout) return shootoutEventHtml(e);
        const own = t.includes('own');
        // A scoring play is a goal even if other text is present; only treat as a
        // card when ESPN's card flag (or unambiguous card text) says so.
        const isGoal = e.scoringPlay === true || (e.scoringPlay == null && t.includes('goal'));
        const isRed = !isGoal && (e.redCard === true || (e.redCard == null && t.includes('red')));
        const isYellow = !isGoal && !isRed && (e.yellowCard === true || t.includes('yellow') || t.includes('card'));
        let icon = ICON.ball;                                          // goal/penalty (default)
        if (isGoal) icon = own ? ICON.ball + ' <span style="color:var(--muted);font-size:11px">OG</span>' : ICON.ball;
        else if (isRed) icon = '<span class="card-red"></span>';
        else if (isYellow) icon = '<span class="card-yellow"></span>';
        const who = (e.participants || []).map(p => p.athlete?.displayName).filter(Boolean).join(', ');
        const clock = e.clock?.displayValue || '';
        const teamAbbr = e.team?.abbreviation || e.team?.displayName || '';
        const text = who || e.text || e.type?.text || '';
        return '<div class="detail-event">' +
          '<span class="detail-clock">' + esc(clock) + '</span>' +
          '<span class="detail-icon">' + icon + '</span>' +
          '<span>' + esc(text) + (teamAbbr ? ' <span style="color:var(--muted)">(' + esc(teamAbbr) + ')</span>' : '') + '</span>' +
        '</div>';
      });
    detailsCache[eventId] = (shootoutSummary || rows.length)
      ? shootoutSummary + rows.join('')
      : '<div class="detail-note">No goals, cards or shootout details yet.</div>';
  } catch (err) {
    detailsCache[eventId] = '<div class="detail-note">Could not load match events. Tap to close and try again.</div>';
  }
  if (lastData) render(lastData);
}

/* Card interaction: expand/collapse + star toggling (event delegation) */
content.addEventListener('click', (e) => {
  const fav = e.target.closest('.fav-btn');
  if (fav) {
    e.stopPropagation();
    const id = fav.dataset.teamId;
    if (!id) return;
    if (favourites[id]) delete favourites[id];
    else favourites[id] = fav.dataset.teamName || id;
    store.set('wc26.favs', favourites);
    if (lastData) render(lastData);
    renderCalendar();
    return;
  }
  const card = e.target.closest('.match');
  if (!card) return;
  const id = card.dataset.eventId;
  if (expanded.has(id)) {
    expanded.delete(id);
  } else {
    expanded.add(id);
    if (!detailsCache[id]) loadDetails(id);
  }
  if (lastData) render(lastData);
});
content.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const card = e.target.closest('.match');
  if (!card || e.target.closest('.fav-btn')) return;
  e.preventDefault();
  card.click();
});

/* ---------- Loading the scoreboard ---------- */

async function load() {
  if (fetching) return;
  fetching = true;
  try {
    /* ESPN day pages are US Eastern; fetch a ±1 day window and keep only the
       games that fall on the selected LOCAL date. */
    const start = new Date(selectedDate); start.setDate(start.getDate() - 1);
    const end = new Date(selectedDate); end.setDate(end.getDate() + 1);
    const url = BASE_URL + '?dates=' + yyyymmdd(start) + '-' + yyyymmdd(end) + '&limit=200';
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    data.events = (data.events || []).filter(ev => localDay(ev.date) === isoDay(selectedDate));
    detectGoals(data);
    lastData = data;
    const hasLive = render(data);
    lastUpdatedEl.textContent = 'Updated ' + new Date().toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit', second: '2-digit' });
    updateCountdown();
    scheduleNext(hasLive);
    if (currentTab === 'Awards') { refreshLiveScorers(); scanCompletedScorers(); }
    if (currentTab === 'Polls') renderPolls();
  } catch (err) {
    content.innerHTML = '<div class="error-box">Could not load scores (' + esc(err.message) +
      '). The feed may be briefly unavailable — it will retry automatically, or hit Refresh.</div>';
    scheduleNext(false);
  } finally {
    fetching = false;
  }
}

function scheduleNext(hasLive) {
  clearTimeout(refreshTimer);
  if (!autoRefreshEl.checked) return;
  refreshTimer = setTimeout(load, hasLive ? 30000 : 60000);
}

function selectDate(d) {
  selectedDate = clampToTournament(stripTime(d));
  if (selectedDate.getMonth() !== calMonth.getMonth() ||
      selectedDate.getFullYear() !== calMonth.getFullYear()) {
    calMonth = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
    loadCalendarMonth();
  } else {
    renderCalendar();
  }
  updateDateLabel();
  load();
}

/* ---------- Countdown to next kickoff ---------- */

function nextKickoff() {
  const now = Date.now();
  let next = null;
  // From the loaded day
  (lastData?.events || []).forEach(ev => {
    const t = new Date(ev.date).getTime();
    if (t > now && (!next || t < next)) next = t;
  });
  // From cached month fixtures
  Object.values(monthEvents).forEach(byDay => {
    Object.values(byDay).forEach(list => {
      list.forEach(e => {
        const t = new Date(e.d).getTime();
        if (t > now && (!next || t < next)) next = t;
      });
    });
  });
  return next;
}

function updateCountdown() {
  const anyLive = (lastData?.events || []).some(e => e.competitions?.[0]?.status?.type?.state === 'in');
  if (anyLive) { countdownEl.hidden = true; return; }
  const next = nextKickoff();
  if (!next) { countdownEl.hidden = true; return; }
  const mins = Math.round((next - Date.now()) / 60000);
  if (mins < 0) { countdownEl.hidden = true; return; }
  const h = Math.floor(mins / 60), m = mins % 60;
  const txt = h >= 24
    ? Math.floor(h / 24) + 'd ' + (h % 24) + 'h'
    : (h ? h + 'h ' : '') + m + 'm';
  countdownEl.innerHTML = 'Next kickoff in <strong>' + txt + '</strong>';
  countdownEl.hidden = false;
}
setInterval(updateCountdown, 30000);

function monthKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');

async function loadCalendarMonth() {
  renderCalendar();
  const key = monthKey(calMonth);
  if (monthEvents[key]) return;

  calLoadingEl.hidden = false;
  try {
    /* Fetch a day either side of the month so games landing on a local date
       just inside the month (but on an adjacent ET page) aren't missed. */
    const first = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
    first.setDate(first.getDate() - 1);
    const last = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 0);
    last.setDate(last.getDate() + 1);
    const url = BASE_URL + '?dates=' + yyyymmdd(first) + '-' + yyyymmdd(last) + '&limit=400';
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const byDay = {};
    (data.events || []).forEach(ev => {
      if (!ev.date) return;
      const day = localDay(ev.date);   // the viewer's local date, not ESPN's ET pages
      const comps = ev.competitions?.[0]?.competitors || [];
      const teams = comps.map(c => {
        const t = c.team || {};
        return [t.displayName, t.shortDisplayName, t.name, t.abbreviation, t.location]
          .filter(Boolean).join(' ').toLowerCase();
      }).join(' | ');
      const ids = comps.map(c => c.team?.id).filter(Boolean);
      (byDay[day] = byDay[day] || []).push({ teams, ids, d: ev.date });
    });
    monthEvents[key] = byDay;
    renderCalendar();
    updateCountdown();
  } catch (err) {
    // Leave the grid without dots
  } finally {
    calLoadingEl.hidden = true;
  }
}

function renderCalendar() {
  const key = monthKey(calMonth);
  const byDay = monthEvents[key] || {};
  const q = document.getElementById('teamSearch').value.trim().toLowerCase();

  const gameDays = new Set();
  const favDays = new Set();
  const memberIds = memberFilter ? memberTeamIds(memberFilter) : null;
  Object.keys(byDay).forEach(day => {
    const list = byDay[day].filter(e => {
      if (memberIds && !e.ids.some(id => memberIds.has(id))) return false;
      if (!q) return true;
      // teams string holds both teams separated by '|'
      return e.teams.includes(q);
    });
    if (list.length) {
      gameDays.add(day);
      if (list.some(e => e.ids.some(id => favourites[id]))) favDays.add(day);
    }
  });

  const today = localToday();

  const atFirstMonth = calMonth.getFullYear() === 2026 && calMonth.getMonth() === 5;
  const atLastMonth = calMonth.getFullYear() === 2026 && calMonth.getMonth() === 6;
  document.getElementById('calPrev').disabled = atFirstMonth;
  document.getElementById('calPrev').style.visibility = atFirstMonth ? 'hidden' : 'visible';
  document.getElementById('calNext').disabled = atLastMonth;
  document.getElementById('calNext').style.visibility = atLastMonth ? 'hidden' : 'visible';

  calMonthEl.textContent = calMonth.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

  const dows = ['Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa', 'Su'];
  let html = dows.map(d => '<span class="cal-dow">' + d + '</span>').join('');

  const firstDow = (new Date(calMonth.getFullYear(), calMonth.getMonth(), 1).getDay() + 6) % 7;
  const daysInMonth = new Date(calMonth.getFullYear(), calMonth.getMonth() + 1, 0).getDate();

  for (let i = 0; i < firstDow; i++) html += '<span></span>';

  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(calMonth.getFullYear(), calMonth.getMonth(), day);
    const iso = isoDay(d);
    const inTournament = d >= WC_START && d <= WC_END;
    const classes = ['cal-day'];
    if (!inTournament) classes.push('out-range');
    if (inTournament && gameDays.has(iso)) classes.push('has-games');
    if (favDays.has(iso)) classes.push('fav-day');
    if (sameDay(d, today)) classes.push('today');
    if (sameDay(d, selectedDate)) classes.push('selected');
    if (inTournament && gameDays.has(iso)) {
      html += '<button class="' + classes.join(' ') + '" data-iso="' + iso + '">' + day + '</button>';
    } else {
      html += '<span class="' + classes.join(' ') + '">' + day + '</span>';
    }
  }
  calGrid.innerHTML = html;

  calGrid.querySelectorAll('button.cal-day').forEach(btn => {
    btn.addEventListener('click', () => {
      const [y, m, dd] = btn.dataset.iso.split('-').map(Number);
      selectDate(new Date(y, m - 1, dd));
    });
  });
}

function statVal(entry, names) {
  const stats = entry.stats || [];
  for (const n of names) {
    const s = stats.find(s =>
      s.name === n || s.abbreviation === n || s.shortDisplayName === n || s.type === n);
    if (s) return s.displayValue ?? s.value ?? '';
  }
  return '';
}
function statNum(entry, names) {
  const v = parseFloat(statVal(entry, names));
  return isNaN(v) ? null : v;
}
/* Sort a group's entries into ladder order (1st to last). Prefers ESPN's own
   rank if present, else points, then goal difference, goals for, then wins. */
function ladderSort(entries) {
  return entries.slice().sort((a, b) => {
    const ra = statNum(a, ['rank']), rb = statNum(b, ['rank']);
    if (ra != null && rb != null && ra !== rb) return ra - rb;
    return ((statNum(b, ['points', 'PTS', 'P']) ?? -99) - (statNum(a, ['points', 'PTS', 'P']) ?? -99)) ||
           ((statNum(b, ['pointDifferential', 'GD']) ?? -99) - (statNum(a, ['pointDifferential', 'GD']) ?? -99)) ||
           ((statNum(b, ['pointsFor', 'GF', 'goalsFor']) ?? -99) - (statNum(a, ['pointsFor', 'GF', 'goalsFor']) ?? -99)) ||
           ((statNum(b, ['wins', 'W']) ?? -99) - (statNum(a, ['wins', 'W']) ?? -99));
  });
}

  }).join('');
}

function normName(s) {
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // strip diacritics
    .replace(/[^a-z ]/g, '').replace(/\s+/g, ' ').trim();
}
function resolveTeamId(name) {
  const n = normName(name);
  const candidates = [n, ...(TEAM_ALIASES[n] || []).map(normName)];
  for (const id of Object.keys(teamIndex)) {
    const tn = normName(teamIndex[id].name);
    if (candidates.some(c => tn === c || tn.includes(c) || c.includes(tn))) return id;
  }
  return null;
}

  let changed = false;

        if (id) { en.teamId = id; en.teamName = teamIndex[id].name; if (!LOCKED_LEAGUES.has(league)) changed = true; }

}

function clearGroupStageEliminations() {
  Object.keys(eliminated).forEach(id => { if (eliminated[id] === 'Group') delete eliminated[id]; });
}
function teamStatNumber(t, key) {
  const n = parseFloat(t?.[key]);
  return Number.isFinite(n) ? n : 0;
}
function groupStageCompleteEnough() {
  const groups = standingsData?.children || [];
  return groups.length >= 12 && groups.every(g =>
    (g.standings?.entries || []).length >= 4 &&
    (g.standings?.entries || []).every(en => (statNum(en, ['gamesPlayed', 'GP']) || 0) >= 3));
}
function applyGroupStageEliminations(knockoutTeamIds) {
  clearGroupStageEliminations();

  // Best source once ESPN has filled the Round of 32: any team missing from the
  // knockout draw was knocked out in the group stage.
  if (knockoutTeamIds && knockoutTeamIds.size >= 32) {
    Object.keys(teamIndex).forEach(id => {
      if (!knockoutTeamIds.has(id) && !eliminated[id] && champion !== id) eliminated[id] = 'Group';
    });
    return;
  }

  // Before the R32 draw is fully populated, mark confirmed group exits. 4th place
  // is out once that group has played three games; 3rd-place exits are only safe
  // once every group has finished because the best eight 3rd-place teams advance.
  Object.keys(teamIndex).forEach(id => {
    const t = teamIndex[id];
    if (!eliminated[id] && Number(t.gp) >= 3 && Number(t.rank) >= 4) eliminated[id] = 'Group';
  });

  if (!groupStageCompleteEnough()) return;
  const thirds = Object.keys(teamIndex)
    .filter(id => Number(teamIndex[id].rank) === 3)
    .sort((a, b) =>
      teamStatNumber(teamIndex[b], 'pts') - teamStatNumber(teamIndex[a], 'pts') ||
      teamStatNumber(teamIndex[b], 'gd') - teamStatNumber(teamIndex[a], 'gd') ||
      teamStatNumber(teamIndex[b], 'gf') - teamStatNumber(teamIndex[a], 'gf') ||
      teamIndex[a].name.localeCompare(teamIndex[b].name));
  thirds.slice(8).forEach(id => { if (!eliminated[id]) eliminated[id] = 'Group'; });
}

/* Which league's tags show on Matches/Bracket — set by opening a league tab */
let chipLeague = store.get('wc26.chipLeague', null);   // null = none chosen yet, show all
function setChipLeague(league) {

/* Home-screen comp filter: All / Hoogies / Shrunk */
let compFilter = store.get('wc26.comp', 'all');
function activeLeagues() {

}
function paintCompFilter() {

function sweepTagsFor(teamId) {
  const tags = [];
  if (!teamId) return tags;
  activeLeagues().forEach(league => {
    sweeps[league].forEach(en => {
      if (en.teamId !== teamId) return;
      tags.push({ league, member: en.member, role: en.role || 'best' });
    });
  });
  return tags;
}

/* Member filter: show only games involving one member's teams */
let memberFilter = store.get('wc26.memberFilter', '');
const memberBtn = document.getElementById('memberBtn');
const memberBtnLabel = document.getElementById('memberBtnLabel');
const memberMenu = document.getElementById('memberMenu');

/* Same person, different names across the two draws (none needed currently —
   names are kept identical in both draws instead) */
const MEMBER_ALIASES = [];
function sameMember(a, b) {
  const x = a.toLowerCase(), y = b.toLowerCase();
  if (x === y) return true;
  return MEMBER_ALIASES.some(group => group.includes(x) && group.includes(y));
}

function memberTeamIds(name) {
  // Spans the leagues currently in play (all by default), so dual-league
  // members see all their teams unless a single comp is selected
  const ids = new Set();
  activeLeagues().forEach(league => {
    sweeps[league].forEach(en => {
      if (sameMember(en.member, name) && en.teamId) ids.add(en.teamId);
    });
  });
  return ids;
}

function memberLeagues(name) {
  return SWEEP_LEAGUES.filter(league =>
    sweeps[league].some(en => sameMember(en.member, name)));
}

function populateMemberFilter() {
  // Players from the selected comp (or all comps) are selectable
  const names = new Set();
  activeLeagues().forEach(league =>
    sweeps[league].forEach(en => names.add(en.member)));
  const sorted = [...names].sort((a, b) => a.localeCompare(b));
  if (memberFilter && !sorted.some(n => n.toLowerCase() === memberFilter.toLowerCase())) {
    memberFilter = '';
    store.set('wc26.memberFilter', '');
  }
  memberMenu.innerHTML =
    '<button class="member-item' + (!memberFilter ? ' selected' : '') +
      '" data-member="" role="option">All games</button>' +
    sorted.map(n => '<button class="member-item' +
      (n.toLowerCase() === memberFilter.toLowerCase() ? ' selected' : '') +
      '" data-member="' + esc(n) + '" role="option">' + esc(n) + '&rsquo;s games' +
      (memberLeagues(n).length > 1 ? ' <span class="both-note">(both leagues)</span>' : '') +
      '</button>').join('');
  memberBtnLabel.textContent = memberFilter ? memberFilter + '\u2019s games' : 'All games';
}

function closeMemberMenu() {
  memberMenu.hidden = true;
  memberBtn.setAttribute('aria-expanded', 'false');
}
memberBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const open = memberMenu.hidden;
  memberMenu.hidden = !open;
  memberBtn.setAttribute('aria-expanded', String(open));

memberMenu.addEventListener('click', (e) => {

  memberFilter = item.dataset.member;

document.addEventListener('click', (e) => {

});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeMemberMenu();
});

function matchesMemberFilter(comps) {
  if (!memberFilter) return true;
  const ids = memberTeamIds(memberFilter);
  return comps.some(c => ids.has(c.team?.id));
}

function sweepMemberStrings() {
  // For search: member names lowercased mapped to their teamIds
  const out = {};
  activeLeagues().forEach(league => {
    sweeps[league].forEach(en => {
      const k = en.member.toLowerCase();
      (out[k] = out[k] || new Set()).add(en.teamId);
    });
  });
  return out;
}

const ROLE_LABELS = {
  Hoogies: { best: 'Golden', dud: 'Sh*t' },
  Shrunk: { best: 'Best', dud: 'Dud' }
};
function roleLabel(league, role) {
  return (ROLE_LABELS[league] || ROLE_LABELS.Shrunk)[role === 'dud' ? 'dud' : 'best'];
}

function stageShort(slug) {
  return { 'round-of-32': 'R32', 'round-of-16': 'R16', 'quarterfinals': 'QF',
    'semifinals': 'SF', 'third-place-match': '3rd', 'final': 'Final' }[slug] || slug;
}

let koEvents = null;
let bracketCollapse = store.get('wc26.bracketCollapse2', { top: true, bottom: true });
if (!bracketCollapse || typeof bracketCollapse !== 'object') bracketCollapse = { top: true, bottom: true };
async function loadKnockouts() {
  if (elimsLoaded) { renderBracket(); return; }
  elimsLoaded = true;   // attempt once per page load
  try {
    // Knockout rounds run 28 June – 19 July (ET pages; +1 day buffer for safety)
    const res = await fetch(BASE_URL + '?dates=20260628-20260720&limit=400');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    koEvents = data.events || [];
    koWins = {};
    koLosses = {};
    champion = null;
    const knockoutTeamIds = new Set();
    koEvents.forEach(ev => {
      const slugForIds = ev.season?.slug || '';
      if (slugForIds !== 'group-stage') {
        (ev.competitions?.[0]?.competitors || []).forEach(c => {
          if (c.team?.id && !String(c.team.id).startsWith('$')) knockoutTeamIds.add(c.team.id);
        });
      }
      const comp = ev.competitions?.[0];
      if (!comp || comp.status?.type?.state !== 'post') return;
      const slug = ev.season?.slug || '';
      if (slug === 'group-stage') return;
      const comps = comp.competitors || [];
      const loser = comps.find(c => !c.winner);
      const winner = comps.find(c => c.winner);
      if (winner?.team?.id) koWins[winner.team.id] = (koWins[winner.team.id] || 0) + 1;
      if (loser?.team?.id) koLosses[loser.team.id] = (koLosses[loser.team.id] || 0) + 1;
      if (slug === 'third-place-match') return;   // counts for points, not elimination
      if (loser?.team?.id) eliminated[loser.team.id] = stageShort(slug);
      if (slug === 'final' && winner?.team?.id) champion = winner.team.id;
    });
    applyGroupStageEliminations(knockoutTeamIds);
    renderSweeps();
    renderBracket();
  } catch (err) {
    document.getElementById('bracketWrap').innerHTML =
      '<div class="error-box">Could not load the knockout draw (' + esc(err.message) + ').</div>';
  }
}

/* ---------- Bracket rendering ---------- */

function bTeamHtml(c) {
  if (!c || !c.team) {
    return '<div class="b-team b-tbd"><div class="b-team-row"><span class="b-flag-tbd"></span><span class="b-name">TBD</span></div></div>';
  }
  const t = c.team;
  const tags = sweepTagsFor(t.id);
  const cls = c.winner ? ' b-winner' : (c.winner === false && c.score != null && c._decided ? ' b-loser' : '');
  const chips = tags.map(tag =>
    '<span class="b-chip ' + tag.league.toLowerCase() + (tag.role === 'dud' ? ' dud' : '') +
    '" title="' + esc(tag.league) + ': ' + esc(tag.member) +
    (tag.role === 'dud' ? ' (' + esc(roleLabel(tag.league, 'dud').toLowerCase()) + ')' : '') + '">' +
    esc(tag.member) + '</span>').join('');
  return '<div class="b-team' + cls + '">' +
    '<div class="b-team-row">' +
      (t.logo ? '<img class="b-flag" src="' + esc(t.logo) + '" alt="' + esc(t.displayName || '') + ' flag" loading="lazy">'
              : '<span class="b-flag-tbd"></span>') +
      '<span class="b-name">' + esc(t.abbreviation || t.shortDisplayName || t.displayName || '?') + '</span>' +
      (c.score != null && c.score !== '' ? '<span class="b-score">' + esc(c.score) +
        (competitorPenaltyScore(c) !== '' ? '<span class="b-pen-score">(' + esc(competitorPenaltyScore(c)) + ')</span>' : '') +
        '</span>' : '') +
    '</div>' +
    (chips ? '<div class="b-team-chips">' + chips + '</div>' : '') +
  '</div>';
}

function bCellHtml(ev) {
  if (!ev) {
    return '<div class="b-cell">' + bTeamHtml(null) + bTeamHtml(null) + '</div>';
  }
  const comp = ev.competitions?.[0] || {};
  const state = comp.status?.type?.state;
  const decided = state === 'post';
  const comps = (comp.competitors || []).slice()
    .sort((a, b) => (a.homeAway === 'home' ? -1 : 1));
  comps.forEach(c => c._decided = decided);
  const home = comps[0], away = comps[1];
  return '<div class="b-cell' + (state === 'in' ? ' b-live' : '') + '">' +
    bTeamHtml(home) + bTeamHtml(away) +
    shootoutSummaryHtmlFromCompetition(comp, 'bracket') +
  '</div>';
}

function bColHtml(label, events, extraClass) {
  return '<div class="b-col' + (extraClass ? ' ' + extraClass : '') + '">' +
    '<div class="b-round-label">' + esc(label) + '</div>' +
    '<div class="b-cells">' + events.map(ev => '<div class="b-slot">' + bCellHtml(ev) + '</div>').join('') + '</div>' +
  '</div>';
}

/* Miniature spinning trophy for the Final, rendered from trophy.glb (the same
   model as the background). A singleton renderer whose canvas is re-mounted on
   each bracket render; falls back to a procedural gold trophy if the GLB fails. */
let miniTrophy = null;
function initMiniTrophy() {
  if (miniTrophy || typeof THREE === 'undefined') return;
  const W = 104, H = 128;
  const canvas = document.createElement('canvas');
  canvas.className = 'b-trophy3d-canvas';
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(W, H, false);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, W / H, 0.1, 100);
  camera.position.set(0, 0, 13);
  scene.add(new THREE.AmbientLight(0xcfd8e3, 0.85));
  const key = new THREE.DirectionalLight(0xfff3dc, 1.6); key.position.set(3, 6, 5); scene.add(key);
  const rim = new THREE.DirectionalLight(0x2fbf71, 0.5); rim.position.set(-4, -2, -3); scene.add(rim);
  const holder = new THREE.Group(); scene.add(holder);
  miniTrophy = { renderer, scene, camera, canvas, holder };

  const frame = (obj) => {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const centre = box.getCenter(new THREE.Vector3());
    const scale = 7 / Math.max(size.y, 0.0001);
    obj.scale.setScalar(scale);
    obj.position.sub(centre.multiplyScalar(scale));
    holder.add(obj);
  };
  const procedural = () => {
    const gold = new THREE.MeshPhongMaterial({ color: 0xd9b24a, specular: 0xfff2c4, shininess: 80 });
    const g = new THREE.Group();
    const pts = [[1.05,0],[1.05,0.22],[0.78,0.3],[0.62,0.55],[0.3,0.75],[0.2,1.1],
      [0.26,1.7],[0.2,2.3],[0.34,2.75],[0.72,3.1],[0.92,3.5],[0.96,3.9],[0.88,4.0]]
      .map(p => new THREE.Vector2(p[0], p[1]));
    g.add(new THREE.Mesh(new THREE.LatheGeometry(pts, 40), gold));
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.62, 24, 18), gold);
    orb.position.y = 4.3; g.add(orb);
    frame(g);
  };
  const tryLoad = (urls) => {
    if (!urls.length || !THREE.GLTFLoader) { procedural(); return; }
    new THREE.GLTFLoader().load(urls[0], gltf => frame(gltf.scene), undefined,
      () => tryLoad(urls.slice(1)));
  };
  tryLoad(['trophy.glb', 'https://raw.githubusercontent.com/shrunk-scott/worldies/main/trophy.glb']);

  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  function animate() {
    miniTrophy.raf = requestAnimationFrame(animate);
    if (!canvas.isConnected) return;               // skip GPU work when off-screen
    if (!reduce) holder.rotation.y += 0.012;
    renderer.render(scene, camera);
  }
  animate();
}
function mountMiniTrophy() {
  initMiniTrophy();
  const mount = document.getElementById('trophyMount');
  if (mount && miniTrophy && miniTrophy.canvas && miniTrophy.canvas.parentNode !== mount) {
    mount.appendChild(miniTrophy.canvas);
  }
}

function renderBracket() {
  const wrap = document.getElementById('bracketWrap');
  if (!koEvents) return;   // nothing fetched yet
  // Bracket position order: event id ascending tracks the match number (and thus
  // the top-to-bottom bracket slot) far better than kickoff date.
  const ordKey = e => Number(e.id) || 0;
  const bySlug = slug => koEvents
    .filter(e => (e.season?.slug || '') === slug)
    .sort((a, b) => ordKey(a) - ordKey(b) || (new Date(a.date) - new Date(b.date)));

  function pad(arr, n) {
    const out = arr.slice(0, n);
    while (out.length < n) out.push(null);
    return out;
  }
  const R32 = pad(bySlug('round-of-32'), 16);
  const R16 = pad(bySlug('round-of-16'), 8);
  const QF = pad(bySlug('quarterfinals'), 4);
  const SF = pad(bySlug('semifinals'), 2);
  const FIN = pad(bySlug('final'), 1);
  const TP = bySlug('third-place-match')[0] || null;

  /* WC-2026 knockout feeding map — verified against the official FIFA / Guardian
     wallchart (all 8 Last-16 pairings match). The numbers below are 1-based slot
     indices into each round's event-id-ascending array (R32 = ids -> slots 1-16,
     R16 = 1-8, QF = 1-4, SF = 1-2).

     IMPORTANT: ESPN's event-id order is NOT the bracket order. ESPN's R16
     placeholders ("Round of 32 N Winner") reference the official FIFA *match
     number* (matches 73-88), which runs in a different order from ESPN's ids.
     Mapping the R32 group placeholders (e.g. "Group E Winner v 3rd A/B/C/D/F")
     to the wallchart gives this id-slot -> official-match map:
         slot 1=73  2=76  3=75  4=74  5=78  6=79  7=77  8=82
              9=81 10=80 11=83 12=84 13=85 14=88 15=86 16=87
     QF and SF id-order DO already match the official order. The arrays below are
     the top-to-bottom display order per half (left side -> SF1, right -> SF2),
     walked down the tree so each match sits between its two real feeders. e.g.
     top.r32 starts [4,7,...] => match 74 (Germany-Paraguay) feeds Last-16 #89
     alongside match 77 (France-Sweden), exactly as the wallchart shows.
     If FIFA/ESPN ever reseed, update these constants. */
  const BRACKET = {
    top:    { r32: [4, 7, 1, 3, 11, 12, 9, 8],  r16: [2, 1, 5, 6], qf: [1, 2], sf: [1] },
    bottom: { r32: [2, 5, 6, 10, 15, 14, 13, 16], r16: [3, 4, 8, 7], qf: [3, 4], sf: [2] }
  };
  // Map 1-based bracket slot numbers onto a round's id-ordered array.
  const pick = (arr, slots) => slots.map(s => arr[s - 1] || null);

  const half = (r32, r16, qf, sf) =>
    '<div class="bracket-scroll"><div class="b-grid4">' +
      bColHtml('Round of 32', r32, 'b-r0') +
      bColHtml('Round of 16', r16, 'b-r1') +
      bColHtml('Quarter-finals', qf, 'b-r2') +
      bColHtml('Semi-final', sf, 'b-r3') +
    '</div></div>';

  let winnerHtml = '';
  if (champion && teamIndex[champion]) {
    const t = teamIndex[champion];
    winnerHtml = '<div class="b-winner-box">' +
      (t.logo ? '<img src="' + esc(t.logo) + '" alt="' + esc(t.name) + ' flag">' : '') +
      '<div class="b-winner-label">Winners</div>' +
      '<div class="b-winner-name">' + esc(t.name) + '</div>' +
      sweepTagsFor(champion).map(tag =>
        '<div><span class="b-chip ' + tag.league.toLowerCase() + '">' + esc(tag.league) + ': ' + esc(tag.member) + '</span></div>').join('') +
    '</div>';
  }

  const thirdHtml = TP
    ? '<div class="b-third"><div class="b-third-label">Third-place play-off</div>' + bCellHtml(TP) + '</div>'
    : '';

  const halfBlock = (which, label, dotClass, body) => {
    const collapsed = !!bracketCollapse[which];
    const caret = collapsed ? '\u25b8 show' : '\u25be hide';
    return '<div class="b-half' + (collapsed ? ' collapsed' : '') + '">' +
      '<div class="b-half-label ' + dotClass + '">' +
        '<button class="b-half-toggle" data-half="' + which + '"><span>' + label + '</span>' +
          '<span class="b-half-caret">' + caret + '</span></button>' +
      '</div>' + body +
    '</div>';
  };

  const trophy = '<div id="trophyMount" class="b-trophy3d" aria-hidden="true"></div>';

  wrap.innerHTML =
    '<div class="bracket-halves">' +
      '<div class="b-final-band">' +
        trophy +
        '<div class="b-half-label b-fin">Final</div>' +
        '<div class="b-final-cell">' + bCellHtml(FIN[0]) + '</div>' +
        winnerHtml + thirdHtml +
      '</div>' +
      halfBlock('top', 'Top half', 'b-top',
        half(pick(R32, BRACKET.top.r32), pick(R16, BRACKET.top.r16),
             pick(QF, BRACKET.top.qf), pick(SF, BRACKET.top.sf))) +
      halfBlock('bottom', 'Bottom half', 'b-bot',
        half(pick(R32, BRACKET.bottom.r32), pick(R16, BRACKET.bottom.r16),
             pick(QF, BRACKET.bottom.qf), pick(SF, BRACKET.bottom.sf))) +
    '</div>' +
    '<div class="bracket-note">Top half and bottom half each run left to right to a semi-final; the two winners meet in the final. Tap a half to expand it. Pairings fill in as the draw is confirmed — Round of 32 kicks off 28 June.</div>';
  mountMiniTrophy();
}

function sweepPoints(en) {
  const t = teamIndex[en.teamId];
  if (!t) return 0;
  const w = (Number(t.w) || 0) + (koWins[en.teamId] || 0);
  const d = Number(t.d) || 0;
  const l = (Number(t.l) || 0) + (koLosses[en.teamId] || 0);
  return w * 2 + d - l;
}

function sweepGames(en) {
  const t = teamIndex[en.teamId];
  if (!t) return 0;
  return (Number(t.gp) || 0) + (koWins[en.teamId] || 0) + (koLosses[en.teamId] || 0);
}

function sweepRow(league, en, idx) {
  const t = teamIndex[en.teamId] || { name: en.teamName || en.teamId, logo: '', group: '', gp: '', w: '', d: '', l: '', pts: '' };
  const role = en.role || 'best';
  let status;
  if (champion && champion === en.teamId) {
    status = '<span class="sweep-status-in">Champion</span>';
  } else if (en.teamId && eliminated[en.teamId]) {
    status = '<span class="sweep-status-out">OUT ' + esc(eliminated[en.teamId]) + '</span>';
  } else {
    status = '<span class="sweep-status-in">Alive</span>';
  }
  const ptsCell = league === 'Shrunk'
    ? '<td style="font-weight:600;color:var(--pitch)">' + sweepPoints(en) + '</td>'
    : '';
  return '<tr>' +
    '<td class="sweep-member">' + esc(en.member) + '</td>' +
    '<td><span class="sweep-team">' +
      (t.logo ? '<img src="' + esc(t.logo) + '" alt="" loading="lazy">' : '') +
      '<span>' + esc(t.name) + '</span>' +
      (t.group ? '<span style="color:var(--muted);font-size:12px">Gr ' + esc(t.group) + '</span>' : '') +
    '</span></td>' +
    '<td><span class="role-' + role + '">' + esc(roleLabel(league, role)) + '</span></td>' +
    '<td>' + esc(t.gp) + '</td><td>' + esc(t.w) + '</td><td>' + esc(t.d) + '</td><td>' + esc(t.l) + '</td>' +
    ptsCell +
    '<td>' + status + '</td>' +
    (LOCKED_LEAGUES.has(league) ? '' :
      '<td><button class="sweep-remove" data-league="' + esc(league) + '" data-idx="' + idx +
      '" title="Remove" aria-label="Remove ' + esc(en.member) + '">&#10005;</button></td>') +
  '</tr>';
}

function teamOptions() {
  const ids = Object.keys(teamIndex);
  if (!ids.length) return '<option value="">Teams loading…</option>';

let currentSweepLeague = null;
function renderSweeps(league) {
  if (league) currentSweepLeague = league;
  if (!currentSweepLeague) currentSweepLeague = chipLeague || 'Hoogies';
  sweepsMain.innerHTML = [currentSweepLeague].map(league => {
    const locked = LOCKED_LEAGUES.has(league);
    let entries = sweeps[league];
    let leaderboardHtml = '';
    if (league === 'Shrunk') {
      entries = entries.slice().sort((a, b) =>
        sweepPoints(b) - sweepPoints(a) || a.member.localeCompare(b.member) ||
        (a.teamName || '').localeCompare(b.teamName || ''));

      // Member leaderboard: aggregate points across each member's teams
      const totals = {};
      sweeps[league].forEach(en => {
        const k = en.member;
        totals[k] = totals[k] || { pts: 0, alive: 0, teams: 0, gp: 0 };
        totals[k].pts += sweepPoints(en);
        totals[k].gp += sweepGames(en);
        totals[k].teams += 1;
        if (!(en.teamId && eliminated[en.teamId])) totals[k].alive += 1;
      });
      const ranked = Object.keys(totals).sort((a, b) =>
        totals[b].pts - totals[a].pts || a.localeCompare(b));
      leaderboardHtml = '<div class="leaderboard">' +
        '<div class="leaderboard-title">Leaderboard</div>' +

            '</tr>';
          }).join('') + '</tbody>' +
        '</table>' +
      '</div>';
    }
    const rows = entries.map((en, i) => sweepRow(league, en, i)).join('');

        ' <span style="color:var(--muted);font-size:13px;letter-spacing:0.02em;text-transform:none;font-family:Barlow,sans-serif;font-weight:400">' +

          : '') +
      '</div>' +

      (entries.length
        ? '<table class="sweep-table">' +
            '<thead><tr><th>Member</th><th>Team</th><th>Pick</th><th>GP</th><th>W</th><th>D</th><th>L</th>' +
            (league === 'Shrunk' ? '<th title="Win +2, draw +1, loss \u22121">Pts</th>' : '') +
            '<th>Status</th>' +
            (locked ? '' : '<th></th>') + '</tr></thead>' +

          (league === 'Shrunk'
            ? '<div class="sweep-empty" style="padding-top:10px">Scoring: win +2 points, draw +1 point, loss \u22121 point. Ranked highest to lowest.</div>'
            : '')

const charterModal = document.getElementById('charterModal');

let charterRendered = false;
let charterRendering = false;

function loadPdfJs() {
  return new Promise((resolve, reject) => {
    if (window.pdfjsLib) return resolve();
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve();
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function renderCharter() {
  if (charterRendered || charterRendering) return;
  charterRendering = true;
  try {
    await loadPdfJs();
    const pdf = await window.pdfjsLib.getDocument('charter.pdf').promise;
    charterPages.innerHTML = '';
    const containerWidth = charterPages.clientWidth - 24;   // minus padding
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    for (let p = 1; p <= pdf.numPages; p++) {
      const page = await pdf.getPage(p);
      const base = page.getViewport({ scale: 1 });
      const scale = (containerWidth / base.width) * dpr;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      charterPages.appendChild(canvas);
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    }
    charterRendered = true;
  } catch (err) {
    charterPages.innerHTML = '<div class="charter-loading">Could not display the charter here. ' +
      '<a href="charter.pdf" target="_blank" rel="noopener" style="color:var(--pitch)">Open the PDF directly</a>.</div>';
  } finally {
    charterRendering = false;
  }
}

function openCharter() {
  charterModal.hidden = false;
  document.body.style.overflow = 'hidden';
  renderCharter();
}
function closeCharter() {
  charterModal.hidden = true;
  document.body.style.overflow = '';
}

});

sweepsMain.addEventListener('click', (e) => {
  const charter = e.target.closest('.charter-btn');
  if (charter) { openCharter(); return; }
  const add = e.target.closest('.sweep-add-btn');
  if (add) {
    const league = add.dataset.league;
    const wrap = add.closest('.sweep-add');
    const nameEl = wrap.querySelector('.sweep-name');
    const pickEl = wrap.querySelector('.sweep-pick');
    const member = nameEl.value.trim();
    const teamId = pickEl.value;
    const role = wrap.querySelector('.sweep-role')?.value || 'best';
    if (!member || !teamId) return;
    sweeps[league].push({ member, teamId, teamName: teamIndex[teamId]?.name || teamId, role });
    saveSweeps();
    renderSweeps();
    if (lastData) render(lastData);
    return;
  }
  const rm = e.target.closest('.sweep-remove');
  if (rm) {
    if (LOCKED_LEAGUES.has(rm.dataset.league)) return;
    sweeps[rm.dataset.league].splice(Number(rm.dataset.idx), 1);
    saveSweeps();
    renderSweeps();
    if (lastData) render(lastData);
  }
});

/* ---------- Three.js starfield background ---------- */

(function initBackground() {
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isSmall = Math.min(window.innerWidth, window.innerHeight) < 600;
  const density = isSmall ? 0.45 : 1;   // fewer particles on phones
  const canvas = document.getElementById('bg3d');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: !isSmall });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, isSmall ? 1.5 : 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 200);
  camera.position.set(0, 0, 10);

  // Soft round star sprite
  function starSprite() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.3, 'rgba(255,255,255,0.55)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 64, 64);
    return new THREE.CanvasTexture(c);
  }
  const sprite = starSprite();

  // Three depth layers of stars with slightly different colours and drift
  function starLayer(count, spread, depth, size, color, opacity) {
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      pos[i * 3] = (Math.random() - 0.5) * spread;
      pos[i * 3 + 1] = (Math.random() - 0.5) * spread * 0.65;
      pos[i * 3 + 2] = depth - Math.random() * 18;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pts = new THREE.Points(geo, new THREE.PointsMaterial({
      color, size, map: sprite, sizeAttenuation: true,
      transparent: true, opacity, depthWrite: false,
      blending: THREE.AdditiveBlending
    }));
    scene.add(pts);
    return pts;
  }

  const near = starLayer(Math.round(350 * density), 36, -2, 0.14, 0xf3d98e, 0.85);
  const mid = starLayer(Math.round(700 * density), 60, -14, 0.11, 0xe0bb62, 0.6);
  const far = starLayer(Math.round(1200 * density), 100, -34, 0.09, 0xb3924a, 0.4);

  // Twinkling accent stars: several small layers, each fading on its own
  // phase and speed so individual stars visibly sparkle
  const twinkles = [];
  const twinkleLayers = isSmall ? 6 : 10;
  for (let i = 0; i < twinkleLayers; i++) {
    twinkles.push({
      pts: starLayer(6, 34, -3 - Math.random() * 4, 0.24 + Math.random() * 0.14, 0xffe9b0, 1),
      phase: Math.random() * Math.PI * 2,
      speed: 0.0012 + Math.random() * 0.0022
    });
  }

  /* Lighting for the trophy (points are unlit, so this only affects the model) */
  scene.add(new THREE.AmbientLight(0xcfd8e3, 0.7));
  const keyLight = new THREE.DirectionalLight(0xfff3dc, 1.4);
  keyLight.position.set(4, 7, 6);
  scene.add(keyLight);
  const rimLight = new THREE.DirectionalLight(0x2fbf71, 0.45);
  rimLight.position.set(-6, -2, -4);
  scene.add(rimLight);

  /* World Cup trophy — trophy.glb hosted alongside this HTML file.
     If the GLB can't be fetched (e.g. previewing the HTML on its own),
     fall back to a procedural gold trophy so the scene is never empty. */
  let trophy = null;

  function mountTrophy(obj) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const centre = box.getCenter(new THREE.Vector3());
    const scale = 4.6 / Math.max(size.y, 0.0001);
    obj.scale.setScalar(scale);
    obj.position.sub(centre.multiplyScalar(scale));
    const holder = new THREE.Group();
    holder.add(obj);
    scene.add(holder);
    trophy = holder;
    positionTrophy();
    if (reduceMotion) renderer.render(scene, camera);
  }

  function proceduralTrophy() {
    const gold = new THREE.MeshPhongMaterial({
      color: 0xd9b24a, specular: 0xfff2c4, shininess: 80
    });
    const g = new THREE.Group();
    // Lathe profile: base plinth up through stem to a flared cup
    const pts = [
      [1.05, 0], [1.05, 0.22], [0.78, 0.3], [0.62, 0.55], [0.3, 0.75],
      [0.2, 1.1], [0.26, 1.7], [0.2, 2.3], [0.34, 2.75], [0.72, 3.1],
      [0.92, 3.5], [0.96, 3.9], [0.88, 4.0]
    ].map(p => new THREE.Vector2(p[0], p[1]));
    g.add(new THREE.Mesh(new THREE.LatheGeometry(pts, 40), gold));
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.62, 32, 24), gold);
    orb.position.y = 4.3;
    g.add(orb);
    return g;
  }

  function loadTrophy(urls) {
    if (!urls.length || !THREE.GLTFLoader) {
      mountTrophy(proceduralTrophy());
      return;
    }
    new THREE.GLTFLoader().load(urls[0],
      (gltf) => mountTrophy(gltf.scene),
      undefined,
      (err) => { console.warn(urls[0] + ' failed to load, trying fallback', err); loadTrophy(urls.slice(1)); });
  }
  loadTrophy(['trophy.glb', 'fifa_world_cup_trophy_2026_weare26.glb']);

  /* Keep the trophy inside the visible frame on any aspect ratio.
     On wide screens it sits right of the content column; on phones it
     tucks behind the content, smaller and further back. */
  function positionTrophy() {
    if (!trophy) return;
    const aspect = window.innerWidth / Math.max(window.innerHeight, 1);
    const halfW = Math.tan((60 / 2) * Math.PI / 180) * 10 * aspect;  // visible half-width at z=0
    if (aspect < 0.8) {
      // Portrait phone: centred vertically, pushed back
      trophy.position.set(halfW * 0.4, 0, -4);
      trophy.scale.setScalar(1.15);
    } else {
      trophy.position.set(Math.min(3.9, halfW * 0.72), -0.4, -1);
      trophy.scale.setScalar(1.45);
    }
  }

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    positionTrophy();
  }
  window.addEventListener('resize', resize);
  resize();

  let raf = null;
  function animate(t) {
    near.rotation.z = t * 0.0000045;
    mid.rotation.z = -t * 0.0000028;
    far.rotation.z = t * 0.0000015;
    twinkles.forEach(tw => {
      tw.pts.material.opacity = 0.12 + Math.abs(Math.sin(t * tw.speed + tw.phase)) * 0.88;
    });
    if (trophy) {
      trophy.rotation.y = t * 0.0003;
      const baseY = (window.innerWidth / Math.max(window.innerHeight, 1)) < 0.8 ? 0 : -0.4;
      trophy.position.y = baseY + Math.sin(t * 0.0005) * 0.12;   // slow float
    }
    renderer.render(scene, camera);
    raf = requestAnimationFrame(animate);
  }

  if (reduceMotion) {
    renderer.render(scene, camera);
    setTimeout(() => renderer.render(scene, camera), 400);
  } else {
    raf = requestAnimationFrame(animate);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { cancelAnimationFrame(raf); raf = null; }
      else if (!raf) raf = requestAnimationFrame(animate);
    });
  }
})();

/* Calculations follow the Competition Charter award rules.

let awardsEvents = null;
let dohResult = null;
const summaryScan = { running: false, done: false };

/* Golden Boot tracker: goals per scorer aggregated from match summaries.
   Completed matches are cached (their scorers never change); live matches are
   refetched so the tracker updates during games. */
let scorerCache = store.get('wc26.scorerCache', {});   // { eventId: [{id,name,teamId,teamAbbr}] }
if (!scorerCache || typeof scorerCache !== 'object') scorerCache = {};
let liveScorers = {};                                  // { eventId: [...] } (not persisted)
const goalsScan = { running: false };

function extractScorers(keyEvents) {
  const out = [];
  (keyEvents || []).forEach(e => {
    const t = (e.type?.text || '').toLowerCase();
    const isGoal = e.scoringPlay === true || (e.scoringPlay == null && t.includes('goal'));
    if (!isGoal) return;
    if (e.shootout === true || t.includes('shootout')) return;   // shootout kicks aren't goals
    if (t.includes('own')) return;                               // own goals don't count
    const sc = (e.participants || [])[0]?.athlete;
    if (!sc) return;
    out.push({ id: String(sc.id || sc.displayName), name: sc.displayName || '',
      teamId: e.team?.id || '', teamAbbr: e.team?.abbreviation || e.team?.displayName || '' });
  });
  return out;
}
function mergedMatches() {
  const byId = {};
  (awardsEvents || []).forEach(e => { byId[e.id] = e; });
  (lastData?.events || []).forEach(e => { byId[e.id] = e; });   // fresher state for today
  return Object.values(byId);
}
async function scanCompletedScorers() {
  if (goalsScan.running) return;
  const completed = mergedMatches().filter(e => e.competitions?.[0]?.status?.type?.state === 'post');
  const todo = completed.filter(e => !scorerCache[e.id]);
  if (!todo.length) return;
  goalsScan.running = true;
  let progressed = 0;
  for (const m of todo.slice(0, 12)) {
    try {
      const res = await fetch(SUMMARY_URL + encodeURIComponent(m.id));
      if (res.ok) { const d = await res.json(); scorerCache[m.id] = extractScorers(d.keyEvents || []); progressed++; }
    } catch (e) { /* retry on a later pass */ }
  }
  if (progressed) store.set('wc26.scorerCache', scorerCache);
  goalsScan.running = false;
  if (progressed) {
    renderAwards();
    if (completed.some(e => !scorerCache[e.id])) setTimeout(scanCompletedScorers, 500);
  }
}
async function refreshLiveScorers() {
  const live = mergedMatches().filter(e => e.competitions?.[0]?.status?.type?.state === 'in');
  const next = {};
  let changed = false;
  for (const m of live) {
    try {
      const res = await fetch(SUMMARY_URL + encodeURIComponent(m.id));

    } catch (e) { if (liveScorers[m.id]) next[m.id] = liveScorers[m.id]; }
  }
  liveScorers = next;
  if (changed) renderAwards();
}
function goldenBoot() {
