/* ---------- Three.js starfield background ---------- */

(function initBackground() {
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isSmall = Math.min(window.innerWidth, window.innerHeight) < 600;
  const density = isSmall ? 0.45 : 1;   // fewer particles on phones
  const canvas = document.getElementById('bg3d');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: !isSmall });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, isSmall ? 1.5 : 2));

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 200);
  camera.position.set(0, 0, 10);

  // Soft round star sprite
  function starSprite() {
    const c = document.createElement('canvas');
    c.width = c.height = 64;
    const ctx = c.getContext('2d');
    const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    g.addColorStop(0, 'rgba(255,255,255,1)');
    g.addColorStop(0.3, 'rgba(255,255,255,0.55)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 64, 64);
    return new THREE.CanvasTexture(c);
  }
  const sprite = starSprite();

  // Three depth layers of stars with slightly different colours and drift
  function starLayer(count, spread, depth, size, color, opacity) {
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      pos[i * 3] = (Math.random() - 0.5) * spread;
      pos[i * 3 + 1] = (Math.random() - 0.5) * spread * 0.65;
      pos[i * 3 + 2] = depth - Math.random() * 18;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const pts = new THREE.Points(geo, new THREE.PointsMaterial({
      color, size, map: sprite, sizeAttenuation: true,
      transparent: true, opacity, depthWrite: false,
      blending: THREE.AdditiveBlending
    }));
    scene.add(pts);
    return pts;
  }

  const near = starLayer(Math.round(350 * density), 36, -2, 0.14, 0xf3d98e, 0.85);
  const mid = starLayer(Math.round(700 * density), 60, -14, 0.11, 0xe0bb62, 0.6);
  const far = starLayer(Math.round(1200 * density), 100, -34, 0.09, 0xb3924a, 0.4);

  // Twinkling accent stars: several small layers, each fading on its own
  // phase and speed so individual stars visibly sparkle
  const twinkles = [];
  const twinkleLayers = isSmall ? 6 : 10;
  for (let i = 0; i < twinkleLayers; i++) {
    twinkles.push({
      pts: starLayer(6, 34, -3 - Math.random() * 4, 0.24 + Math.random() * 0.14, 0xffe9b0, 1),
      phase: Math.random() * Math.PI * 2,
      speed: 0.0012 + Math.random() * 0.0022
    });
  }

  /* Lighting for the trophy (points are unlit, so this only affects the model) */
  scene.add(new THREE.AmbientLight(0xcfd8e3, 0.7));
  const keyLight = new THREE.DirectionalLight(0xfff3dc, 1.4);
  keyLight.position.set(4, 7, 6);
  scene.add(keyLight);
  const rimLight = new THREE.DirectionalLight(0x2fbf71, 0.45);
  rimLight.position.set(-6, -2, -4);
  scene.add(rimLight);

  /* World Cup trophy — trophy.glb hosted alongside this HTML file.
     If the GLB can't be fetched (e.g. previewing the HTML on its own),
     fall back to a procedural gold trophy so the scene is never empty. */
  let trophy = null;

  function mountTrophy(obj) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const centre = box.getCenter(new THREE.Vector3());
    const scale = 4.6 / Math.max(size.y, 0.0001);
    obj.scale.setScalar(scale);
    obj.position.sub(centre.multiplyScalar(scale));
    const holder = new THREE.Group();
    holder.add(obj);
    scene.add(holder);
    trophy = holder;
    positionTrophy();
    if (reduceMotion) renderer.render(scene, camera);
  }

  function proceduralTrophy() {
    const gold = new THREE.MeshPhongMaterial({
      color: 0xd9b24a, specular: 0xfff2c4, shininess: 80
    });
    const g = new THREE.Group();
    // Lathe profile: base plinth up through stem to a flared cup
    const pts = [
      [1.05, 0], [1.05, 0.22], [0.78, 0.3], [0.62, 0.55], [0.3, 0.75],
      [0.2, 1.1], [0.26, 1.7], [0.2, 2.3], [0.34, 2.75], [0.72, 3.1],
      [0.92, 3.5], [0.96, 3.9], [0.88, 4.0]
    ].map(p => new THREE.Vector2(p[0], p[1]));
    g.add(new THREE.Mesh(new THREE.LatheGeometry(pts, 40), gold));
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.62, 32, 24), gold);
    orb.position.y = 4.3;
    g.add(orb);
    return g;
  }

  function loadTrophy(urls) {
    if (!urls.length || !THREE.GLTFLoader) {
      mountTrophy(proceduralTrophy());
      return;
    }
    new THREE.GLTFLoader().load(urls[0],
      (gltf) => mountTrophy(gltf.scene),
      undefined,
      (err) => { console.warn(urls[0] + ' failed to load, trying fallback', err); loadTrophy(urls.slice(1)); });
  }
  loadTrophy(['trophy.glb', 'fifa_world_cup_trophy_2026_weare26.glb']);

  /* Keep the trophy inside the visible frame on any aspect ratio.
     On wide screens it sits right of the content column; on phones it
     tucks behind the content, smaller and further back. */
  function positionTrophy() {
    if (!trophy) return;
    const aspect = window.innerWidth / Math.max(window.innerHeight, 1);
    const halfW = Math.tan((60 / 2) * Math.PI / 180) * 10 * aspect;  // visible half-width at z=0
    if (aspect < 0.8) {
      // Portrait phone: centred vertically, pushed back
      trophy.position.set(halfW * 0.4, 0, -4);
      trophy.scale.setScalar(1.15);
    } else {
      trophy.position.set(Math.min(3.9, halfW * 0.72), -0.4, -1);
      trophy.scale.setScalar(1.45);
    }
  }

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    positionTrophy();
  }
  window.addEventListener('resize', resize);
  resize();

  let raf = null;
  function animate(t) {
    near.rotation.z = t * 0.0000045;
    mid.rotation.z = -t * 0.0000028;
    far.rotation.z = t * 0.0000015;
    twinkles.forEach(tw => {
      tw.pts.material.opacity = 0.12 + Math.abs(Math.sin(t * tw.speed + tw.phase)) * 0.88;
    });
    if (trophy) {
      trophy.rotation.y = t * 0.0003;
      const baseY = (window.innerWidth / Math.max(window.innerHeight, 1)) < 0.8 ? 0 : -0.4;
      trophy.position.y = baseY + Math.sin(t * 0.0005) * 0.12;   // slow float
    }
    renderer.render(scene, camera);
    raf = requestAnimationFrame(animate);
  }

  if (reduceMotion) {
    renderer.render(scene, camera);
    setTimeout(() => renderer.render(scene, camera), 400);
  } else {
    raf = requestAnimationFrame(animate);
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) { cancelAnimationFrame(raf); raf = null; }
      else if (!raf) raf = requestAnimationFrame(animate);
    });
  }
})();

/* ---------- Hoogies Awards ---------- */
/* Calculations follow the Competition Charter award rules.
   Six awards are computed live from the ESPN feed. Where a winning team is a
   "Shared Team" (held by two registrants), the charter tie-breaks decide who
   collects:
     - Winner / Losing Finalist: by the registrants' final-score predictions
       (entered off-app), so both are shown until that is resolved.
     - All others: by the registrant's SECOND team's performance up to the day
       the prize is conferred — most positive goal difference, then most goals
       scored, then lowest per-capita greenhouse emissions. */

function ghgOf(teamId) {

function awardsCompleted() {
  return (awardsEvents || [])
    .filter(ev => ev.competitions?.[0]?.status?.type?.state === 'post')
    .map(ev => {
      const comp = ev.competitions[0];
      const cs = comp.competitors || [];
      const h = cs.find(c => c.homeAway === 'home') || cs[0];
      const a = cs.find(c => c.homeAway === 'away') || cs[1];
      if (!h || !a) return null;
      const hs = Number(h.score), as = Number(a.score);
      const winner = h.winner ? h : (a.winner ? a : null);
      const loser = h.winner ? a : (a.winner ? h : null);
      return {
        id: ev.id, date: ev.date, slug: ev.season?.slug || '',
        h, a, hs, as, margin: Math.abs(hs - as), winner, loser,
        winnerGoals: winner ? (winner === h ? hs : as) : null,
        loserGoals: loser ? (loser === h ? hs : as) : null,
        label: (h.team?.displayName || '?') + ' ' + (isNaN(hs) ? '' : hs) + '\u2013' +
               (isNaN(as) ? '' : as) + ' ' + (a.team?.displayName || '?')
      };
    })
    .filter(Boolean)
    .sort((x, y) => new Date(x.date) - new Date(y.date) || (x.id > y.id ? 1 : -1));
}

/* Cumulative goals for/against per team up to (and including) a given day —
   used for the Shared Team second-team tie-break. */
function teamCumulativeUpTo(dateIso) {
  const lim = new Date(dateIso).getTime();
  const stats = {};
  awardsCompleted().forEach(m => {
    if (new Date(m.date).getTime() > lim) return;
    const hid = m.h.team?.id, aid = m.a.team?.id;
    if (hid) { stats[hid] = stats[hid] || { gf: 0, ga: 0 }; stats[hid].gf += m.hs; stats[hid].ga += m.as; }
    if (aid) { stats[aid] = stats[aid] || { gf: 0, ga: 0 }; stats[aid].gf += m.as; stats[aid].ga += m.hs; }
  });
  return stats;
}

/* Total per-capita GHG across all the teams a registrant holds. The charter's
   final tie-break: when two registrants are level, the one whose countries carry
   the HIGHEST combined emissions is eliminated (lowest wins). */
function memberTeamsGhgTotal(member) {
  const ids = [...new Set(sweeps.Hoogies.filter(e => e.member === member).map(e => e.teamId))];
  let sum = 0, any = false;
  ids.forEach(id => { const g = ghgOf(id); if (g != null) { sum += g; any = true; } });
  return any ? Math.round(sum * 100) / 100 : null;
}

/* Resolve which registrant(s) collect for a winning team, applying the
   Shared Team tie-break. Returns [{member, role, won, note}]. */
function resolveAward(teamId, key, conferDate) {
  const holders = hoogiesHolders(teamId);
  if (holders.length <= 1) return holders.map(h => ({ member: h.member, role: h.role, won: true }));

  if (key === 'winner' || key === 'finalist') {
    return holders.map(h => ({ member: h.member, role: h.role, won: true,
      note: 'Shared Team — decided by final-score prediction' }));
  }

  const cum = teamCumulativeUpTo(conferDate || new Date().toISOString());
  const scored = holders.map(h => {
    const other = secondTeamId(h.member, teamId);
    const s = other ? cum[other] : null;
    return {
      member: h.member, role: h.role, other,
      otherName: other ? (teamIndex[other]?.name || '') : '',
      gd: s ? (s.gf - s.ga) : null,
      gf: s ? s.gf : null,
      total: memberTeamsGhgTotal(h.member)   // emissions tie-break: highest is eliminated
    };
  });
  const ranked = scored.slice().sort((a, b) =>
    ((b.gd ?? -99) - (a.gd ?? -99)) ||
    ((b.gf ?? -99) - (a.gf ?? -99)) ||
    ((a.total ?? Infinity) - (b.total ?? Infinity)));   // lowest combined emissions wins
  const top = ranked[0];
  const fullTie = ranked.length > 1 &&
    ranked[0].gd === ranked[1].gd && ranked[0].gf === ranked[1].gf && ranked[0].total === ranked[1].total;
  return scored.map(h => ({
    member: h.member, role: h.role,
    won: fullTie ? true : (h.member === top.member),
    note: 'Shared — 2nd team ' + (h.otherName || '?') + ': GD ' +
      (h.gd ?? '?') + ', GF ' + (h.gf ?? '?') +
      (h.total != null ? ', teams\u2019 emissions ' + h.total.toFixed(2) + 't' : '')
  }));
}
function withResolved(groups, key) {
  return groups.map(g => ({
    teamId: g.teamId, teamName: teamIndex[g.teamId]?.name || (g.teamName || ''),
    regs: resolveAward(g.teamId, key, g.date)
  }));
}

/* ----- Final-score predictions (Winner & Losing Finalist Shared Teams) ----- */
let finalPreds = store.get('wc26.finalPreds', { actualH: null, actualA: null, preds: {} });
if (!finalPreds || typeof finalPreds !== 'object') finalPreds = { actualH: null, actualA: null, preds: {} };
if (!finalPreds.preds) finalPreds.preds = {};
function saveFinalPreds() { store.set('wc26.finalPreds', finalPreds); }

/* Sync predictions through a Google Sheet (Apps Script web app), if configured.
   Reads replace the local model; writes are fire-and-forget with a localStorage
   cache so the page still works offline or without a sheet. */
async function loadPredictions() {
  if (!PREDICTIONS_WEBAPP_URL) return;
  try {
    const res = await fetch(PREDICTIONS_WEBAPP_URL + (PREDICTIONS_WEBAPP_URL.includes('?') ? '&' : '?') + 'action=get', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && typeof data === 'object') {
      finalPreds = { actualH: data.actualH ?? null, actualA: data.actualA ?? null, preds: data.preds || {} };
      saveFinalPreds();
      renderFinalPredictions();
      renderAwards();
    }
  } catch (e) { /* keep the localStorage copy */ }
}
async function pushPrediction(payload) {
  if (!PREDICTIONS_WEBAPP_URL) return;
  try {
    // text/plain keeps it a "simple" request (no CORS preflight that Apps Script can't answer)
    await fetch(PREDICTIONS_WEBAPP_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
  } catch (e) { /* offline — the localStorage copy holds it until next sync */ }
}

/* ----- Polls — overall winner + per-game "who wins?", stored in the Sheet ----- */
const CHAMPION_POLL = { id: 'champion', q: 'Who will win the World Cup 2026?' };
const POLL_GAME_LIMIT = 16;   // how many upcoming fixtures to open polls for
let votes = store.get('wc26.votes', {});            // { pollId: { voter: choice } }
let voterName = store.get('wc26.voterName', '');
if (!votes || typeof votes !== 'object') votes = {};

function teamNameList() {
  const ids = Object.keys(teamIndex);
  if (!ids.length) return [];   // wait for standings so names are canonical
  return ids.map(id => ({ name: teamIndex[id].name, logo: teamIndex[id].logo }))
    .sort((a, b) => a.name.localeCompare(b.name));
}
function nameLogo(name) {
  const id = Object.keys(teamIndex).find(k => teamIndex[k].name === name);
  return id ? teamIndex[id].logo : '';
}

async function loadVotes() {
  if (!PREDICTIONS_WEBAPP_URL) return;
  try {
    const res = await fetch(PREDICTIONS_WEBAPP_URL + (PREDICTIONS_WEBAPP_URL.includes('?') ? '&' : '?') + 'action=votes', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && typeof data === 'object') {
      votes = data.votes || data;

    }

}
function castVote(poll, voter, choice) {
  votes[poll] = votes[poll] || {};
  votes[poll][voter] = choice;
  store.set('wc26.votes', votes);
  pushPrediction({ type: 'vote', poll: poll, voter: voter, choice: choice });
  renderPolls();
}

function pollTally(v) {
  const t = {};
  Object.values(v).forEach(c => { if (c) t[c] = (t[c] || 0) + 1; });
  return t;
}
function totalLine(v) {
  const t = Object.values(v).filter(Boolean).length;
  return '<div class="poll-total">' + t + (t === 1 ? ' vote' : ' votes') + '</div>';
}
/* Which polls are expanded to show who voted for what. */
let pollExpanded = {};
function votersByChoice(v) {
  const m = {};
  Object.keys(v).forEach(voter => { const c = v[voter]; if (!c) return; (m[c] = m[c] || []).push(voter); });
  return m;
}
/* Per-voter breakdown: each choice with the names that picked it. */
function whoVotedHtml(v, order, logoFn) {
  const m = votersByChoice(v);
  let keys = (order && order.length) ? order.filter(k => m[k]) : [];
  Object.keys(m).forEach(k => { if (!keys.includes(k)) keys.push(k); });   // any extras
  if (!keys.length) return '<div class="poll-who-empty">No votes yet.</div>';
  return keys.map(k => {
    const logo = logoFn ? logoFn(k) : '';
    const names = m[k].slice().sort((a, b) => a.localeCompare(b));
    return '<div class="poll-who-row">' +
      '<span class="poll-who-team">' + (logo ? '<img src="' + esc(logo) + '" alt="" loading="lazy">' : '') + esc(k) + '</span>' +
      '<span class="poll-who-names">' + names.map(n => '<span class="poll-who-chip">' + esc(n) + '</span>').join('') + '</span>' +
    '</div>';
  }).join('');
}
function barsHtml(tally, myChoice, logoFn) {
  const total = Object.values(tally).reduce((s, n) => s + n, 0);
  if (!total) return '<div class="poll-empty">No votes yet — be the first.</div>';
  const max = Math.max(1, ...Object.values(tally));
  return Object.keys(tally).sort((a, b) => tally[b] - tally[a] || a.localeCompare(b)).map(name => {
    const n = tally[name], pct = Math.round(n / total * 100), w = Math.round(n / max * 100);
    const logo = logoFn ? logoFn(name) : '';
    return '<div class="poll-bar-row' + (name === myChoice ? ' mine' : '') + '">' +
      '<span class="poll-bar-team">' + (logo ? '<img src="' + esc(logo) + '" alt="" loading="lazy">' : '') + esc(name) + '</span>' +
      '<span class="poll-bar-track"><span class="poll-bar-fill" style="width:' + w + '%"></span></span>' +
      '<span class="poll-bar-n">' + n + ' (' + pct + '%)</span>' +
    '</div>';
  }).join('');
}

/* Upcoming (and in-progress) fixtures become "who wins this game?" polls */
function gamePolls() {
  return (awardsEvents || []).filter(e => {
    const st = e.competitions?.[0]?.status?.type?.state;
    const cs = e.competitions?.[0]?.competitors || [];
    const h = cs.find(c => c.homeAway === 'home') || cs[0];
    const a = cs.find(c => c.homeAway === 'away') || cs[1];
    return (st === 'pre' || st === 'in') && h?.team?.id && a?.team?.id;
  }).sort((a, b) => new Date(a.date) - new Date(b.date)).slice(0, POLL_GAME_LIMIT)
  .map(ev => {
    const comp = ev.competitions[0];
    const cs = comp.competitors;
    const h = cs.find(c => c.homeAway === 'home') || cs[0];
    const a = cs.find(c => c.homeAway === 'away') || cs[1];
    const state = comp.status?.type?.state;
    const ko = (ev.season?.slug || '') !== 'group-stage';
    const opts = [{ value: h.team.displayName, label: h.team.shortDisplayName || h.team.displayName, logo: h.team.logo || '' }];
    if (!ko) opts.push({ value: 'Draw', label: 'Draw', logo: '' });
    opts.push({ value: a.team.displayName, label: a.team.shortDisplayName || a.team.displayName, logo: a.team.logo || '' });
    return {
      id: 'game:' + ev.id,
      title: h.team.displayName + ' v ' + a.team.displayName,
      when: fmtDay(ev.date) + ' \u00b7 ' + fmtKickoff(ev.date),
      options: opts, locked: state !== 'pre'
    };
  });
}
function gameLockedById(pollId) {
  const id = pollId.replace(/^game:/, '');
  const ev = (awardsEvents || []).find(e => String(e.id) === id);
  const st = ev?.competitions?.[0]?.status?.type?.state;
  return !!(st && st !== 'pre');
}

function renderPolls() {
  const wrap = document.getElementById('pollsWrap');
  if (!wrap) return;
  const members = [...new Set(sweeps.Hoogies.map(e => e.member))].sort((a, b) => a.localeCompare(b));
  const teams = teamNameList();

  const voterOptions = [...new Set([...(voterName ? [voterName] : []), ...members])];
  let html =
    '<div class="poll-voter">Voting as ' +
      '<select id="voterInput" class="poll-name">' +
        '<option value="">Select your name\u2026</option>' +
        voterOptions.map(m => '<option value="' + esc(m) + '"' + (m === voterName ? ' selected' : '') + '>' + esc(m) + '</option>').join('') +
      '</select>' +
    '</div>';

  // Overall winner poll (select of all teams), closes at the final
  {
    const v = votes[CHAMPION_POLL.id] || {};
    const myChoice = voterName ? v[voterName] : null;
    const voteRow = finalLocked()
      ? '<div class="poll-closed">Voting closed — the final has kicked off.</div>'
      : (teams.length
        ? '<div class="poll-vote">' +
            '<select class="poll-pick" data-poll="' + esc(CHAMPION_POLL.id) + '"><option value="">Pick a team…</option>' +
            teams.map(t => '<option value="' + esc(t.name) + '"' + (myChoice === t.name ? ' selected' : '') + '>' + esc(t.name) + '</option>').join('') +
            '</select><button class="poll-btn" data-poll="' + esc(CHAMPION_POLL.id) + '">' + (myChoice ? 'Change vote' : 'Vote') + '</button>' +
          '</div>'
        : '<div class="poll-loading">Loading teams…</div>');
    const total = Object.values(v).filter(Boolean).length;
    const expanded = !!pollExpanded[CHAMPION_POLL.id];
    html += '<div class="poll-card" data-poll="' + esc(CHAMPION_POLL.id) + '">' +
      '<div class="poll-q">' + esc(CHAMPION_POLL.q) + '</div>' +
      voteRow +
      (myChoice ? '<div class="poll-mychoice">Your pick: <strong>' + esc(myChoice) + '</strong></div>' : '') +
      '<div class="poll-results">' + barsHtml(pollTally(v), myChoice, nameLogo) + '</div>' +
      totalLine(v) +
      (total ? '<div class="poll-who-hint">' + (expanded ? 'Tap to hide who voted' : 'Tap to see who voted') + '</div>' : '') +
      (expanded ? '<div class="poll-who">' + whoVotedHtml(v, [], nameLogo) + '</div>' : '') +
    '</div>';
  }

  // Per-game polls
  const gps = gamePolls();
  html += '<div class="poll-section">Upcoming games</div>';
  if (!gps.length) {
    html += '<div class="poll-empty">' + (awardsEvents ? 'No upcoming fixtures to vote on right now.' : 'Loading fixtures…') + '</div>';
  } else {
    gps.forEach(p => {
      const v = votes[p.id] || {};
      const myChoice = voterName ? v[voterName] : null;
      const logoFn = name => { const o = p.options.find(o => o.value === name); return o ? o.logo : nameLogo(name); };
      const controls = p.locked
        ? '<div class="poll-closed">Voting closed — game has started.</div>'
        : '<div class="poll-opts">' + p.options.map(o =>
            '<button class="poll-opt' + (myChoice === o.value ? ' chosen' : '') + '" data-poll="' + esc(p.id) + '" data-choice="' + esc(o.value) + '">' +
              (o.logo ? '<img src="' + esc(o.logo) + '" alt="" loading="lazy">' : '') + esc(o.label) +
            '</button>').join('') + '</div>';
      const total = Object.values(v).filter(Boolean).length;
      const expanded = !!pollExpanded[p.id];
      html += '<div class="poll-card" data-poll="' + esc(p.id) + '">' +
        '<div class="poll-q">' + esc(p.title) + '</div>' +
        '<div class="poll-when">' + esc(p.when) + '</div>' +
        controls +
        (myChoice ? '<div class="poll-mychoice">Your pick: <strong>' + esc(myChoice) + '</strong></div>' : '') +
        '<div class="poll-results">' + barsHtml(pollTally(v), myChoice, logoFn) + '</div>' +
        totalLine(v) +
        (total ? '<div class="poll-who-hint">' + (expanded ? 'Tap to hide who voted' : 'Tap to see who voted') + '</div>' : '') +
        (expanded ? '<div class="poll-who">' + whoVotedHtml(v, p.options.map(o => o.value), logoFn) + '</div>' : '') +
      '</div>';
    });
  }
  wrap.innerHTML = html;
}

const pollsWrapEl = document.getElementById('pollsWrap');
pollsWrapEl.addEventListener('click', (e) => {
  const opt = e.target.closest('.poll-opt');
  if (opt) {
    if (gameLockedById(opt.dataset.poll)) return;   // game already kicked off
    const vi = document.getElementById('voterInput');
    const voter = (vi ? vi.value.trim() : voterName);
    if (!voter) { if (vi) vi.focus(); return; }
    voterName = voter; store.set('wc26.voterName', voterName);
    castVote(opt.dataset.poll, voter, opt.dataset.choice);
    return;
  }
  const btn = e.target.closest('.poll-btn');
  if (btn) {
    const poll = btn.dataset.poll;
    if (poll === 'champion' && finalLocked()) return;   // voting closed at the final
    const vi = document.getElementById('voterInput');
    const voter = (vi ? vi.value.trim() : voterName);
    if (!voter) { if (vi) vi.focus(); return; }
    voterName = voter;
    store.set('wc26.voterName', voterName);
    const sel = pollsWrapEl.querySelector('.poll-pick[data-poll="' + poll + '"]');
    const choice = sel ? sel.value : '';
    if (!choice) { if (sel) sel.focus(); return; }
    castVote(poll, voter, choice);
    return;
  }
  // Tapping a card (but not its vote controls) toggles the who-voted breakdown
  const card = e.target.closest('.poll-card');
  if (card && card.dataset.poll && !e.target.closest('select, button, .poll-vote, .poll-opts')) {
    const id = card.dataset.poll;
    pollExpanded[id] = !pollExpanded[id];
    renderPolls();
  }
});
pollsWrapEl.addEventListener('change', (e) => {
  const vi = e.target.closest('#voterInput');
  if (!vi) return;
  voterName = vi.value.trim();
  store.set('wc26.voterName', voterName);
  renderPolls();   // reflect this voter's existing picks
});

function finalFixture() {
  const ev = (awardsEvents || []).find(e => (e.season?.slug || '') === 'final');
  if (!ev) return null;
  const comp = ev.competitions?.[0];
  const cs = comp?.competitors || [];
  const h = cs.find(c => c.homeAway === 'home') || cs[0];
  const a = cs.find(c => c.homeAway === 'away') || cs[1];
  if (!h || !a || !h.team?.id || !a.team?.id) return null;
  const state = comp.status?.type?.state;
  return { ev, h, a, state, date: ev.date,
    hs: state === 'post' ? Number(h.score) : null,
    as: state === 'post' ? Number(a.score) : null };
}
function finalActual() {
  const f = finalFixture();
  if (!f) return null;
  const h = finalPreds.actualH != null ? finalPreds.actualH : f.hs;
  const a = finalPreds.actualA != null ? finalPreds.actualA : f.as;
  if (h == null || a == null) return null;
  return { h: Number(h), a: Number(a) };
}
/* Once the final has kicked off (or finished) the winner is effectively being
   decided, so champion-poll votes and final-score tips are locked. */
function finalLocked() {
  const f = finalFixture();
  return !!(f && (f.state === 'in' || f.state === 'post'));
}
/* Registrants who hold a Shared finalist team — they're the ones who tip */
function sharedFinalRegistrants() {
  const f = finalFixture();
  if (!f) return [];
  const out = [], seen = new Set();
  [f.h.team?.id, f.a.team?.id].forEach(tid => {
    const hs = hoogiesHolders(tid);
    if (hs.length > 1) hs.forEach(h => {
      if (!seen.has(h.member)) { seen.add(h.member); out.push({ member: h.member, teamName: teamIndex[tid]?.name || '', role: h.role }); }
    });
  });
  return out;
}
/* Resolve a Winner/Finalist Shared Team by the charter's prediction rule:
   the registrant who tips the exact 90' score wins; if none (or all) correct,
   it's shared between both. */
function resolveFinalAward(teamId) {
  const holders = hoogiesHolders(teamId);
  if (holders.length <= 1) return holders.map(h => ({ member: h.member, role: h.role, won: true }));
  const actual = finalActual();
  if (!actual) {
    return holders.map(h => ({ member: h.member, role: h.role, won: true,
      note: 'Shared Team — awaiting final score & predictions' }));
  }
  const scored = holders.map(h => {
    const p = finalPreds.preds[h.member];
    const has = p && p.h != null && p.a != null;
    const correct = has && Number(p.h) === actual.h && Number(p.a) === actual.a;
    return { member: h.member, role: h.role, p, has, correct };
  });
  const anyCorrect = scored.some(s => s.correct);
  return scored.map(s => ({
    member: s.member, role: s.role,
    won: anyCorrect ? s.correct : true,
    note: s.has ? ('tipped ' + s.p.h + '\u2013' + s.p.a + (s.correct ? ' \u2713 correct' : '')) : 'no prediction entered'
  }));
}
function finalGroups(teamId) {
  return [{ teamId, teamName: teamIndex[teamId]?.name || '', regs: resolveFinalAward(teamId) }];
}

function renderFinalPredictions() {
  const el = document.getElementById('predPanel');
  if (!el) return;
  const f = finalFixture();
  const regs = f ? sharedFinalRegistrants() : [];
  if (!f || !regs.length) { el.innerHTML = ''; return; }   // nothing to tip on
  const hName = f.h.team?.displayName || 'Home', aName = f.a.team?.displayName || 'Away';
  const actH = finalPreds.actualH != null ? finalPreds.actualH : (f.hs != null ? f.hs : '');
  const actA = finalPreds.actualA != null ? finalPreds.actualA : (f.as != null ? f.as : '');
  const autoNote = (f.state === 'post' && finalPreds.actualH == null && finalPreds.actualA == null)
    ? ' <span class="pred-auto">(from result — edit if it went to extra time)</span>' : '';
  const locked = finalLocked();
  el.innerHTML =
    '<div class="pred-panel">' +
      '<div class="pred-title">Final score predictions</div>' +
      '<div class="pred-sub">' + esc(hName) + ' vs ' + esc(aName) + ' — ' + fmtDay(f.date) +
        '. Shared-Team finalists are won by whichever registrant tips the exact 90-minute score; if neither does, the prize is split. Enter predictions before kickoff. ' +
        (PREDICTIONS_WEBAPP_URL ? '<span class="pred-auto">Shared live via Google Sheet.</span>' : '<span class="pred-auto">Saved on this device only.</span>') + '</div>' +
      (locked ? '<div class="poll-closed">Tips locked — the final has kicked off.</div>' : '') +
      '<div class="pred-actual">Actual 90\u2019 score: ' +
        '<input type="number" min="0" class="pred-in" data-k="actualH" value="' + esc(actH) + '"> \u2013 ' +
        '<input type="number" min="0" class="pred-in" data-k="actualA" value="' + esc(actA) + '">' + autoNote +
      '</div>' +
      '<div class="pred-list">' + regs.map(r => {
        const p = finalPreds.preds[r.member] || {};
        const actual = finalActual();
        const correct = actual && p.h != null && p.a != null &&
          Number(p.h) === actual.h && Number(p.a) === actual.a;
        return '<div class="pred-row">' +
          '<span class="pred-name">' + esc(r.member) +
            ' <span class="pred-team">' + esc(r.teamName) + ' ' + (r.role === 'dud' ? 'Sh*t' : 'Golden') + '</span></span>' +
          '<input type="number" min="0" class="pred-in" data-pred="' + esc(r.member) + '" data-side="h" value="' + esc(p.h ?? '') + '"' + (locked ? ' disabled' : '') + '> \u2013 ' +
          '<input type="number" min="0" class="pred-in" data-pred="' + esc(r.member) + '" data-side="a" value="' + esc(p.a ?? '') + '"' + (locked ? ' disabled' : '') + '>' +
          (correct ? ' <span class="pred-correct">\u2713 correct</span>' : '') +
        '</div>';
      }).join('') + '</div>' +
    '</div>';
}
function onPredInput(e) {
  const inp = e.target.closest('.pred-in');
  if (!inp) return;
  const raw = String(inp.value).trim();
  const v = raw === '' ? null : Math.max(0, Math.floor(Number(raw)));
  if (inp.dataset.k) {
    finalPreds[inp.dataset.k] = v;
    pushPrediction({ type: 'actual', h: finalPreds.actualH, a: finalPreds.actualA });
  } else if (inp.dataset.pred) {
    if (finalLocked()) return;   // tips close at kickoff
    const m = inp.dataset.pred;
    finalPreds.preds[m] = finalPreds.preds[m] || {};
    finalPreds.preds[m][inp.dataset.side] = v;
    const p = finalPreds.preds[m];
    pushPrediction({ type: 'pred', member: m, h: p.h ?? null, a: p.a ?? null });
  }
  saveFinalPreds();
  renderAwards();   // re-resolve Winner/Finalist; panel keeps focus (separate node)
}

/* Going Home (eliminate England) / Nobel Peace Prize (eliminate USA) share a
   structure: award to whoever knocks the target out. */
function eliminationAward(targetId, opts) {
  const out = { awarded: false, groups: [] };
  if (!targetId) return out;
  const M = awardsCompleted();
  const finalM = M.find(m => m.slug === 'final');
  if (finalM && finalM.winner?.team?.id === targetId) {
    out.awarded = true; out.special = true;
    out.detail = (teamIndex[targetId]?.name || '') + ' won the World Cup — ' + opts.championNote;
    if (opts.foldToWinner) out.groups = [{ teamId: targetId, date: finalM.date }];
    return out;
  }
  const koLoss = M.filter(m => m.slug !== 'group-stage' && m.slug !== 'third-place-match' &&
    m.loser?.team?.id === targetId).sort((a, b) => new Date(a.date) - new Date(b.date))[0];
  if (koLoss) {
    out.awarded = true;
    out.detail = (teamIndex[targetId]?.name || '') + ' eliminated by ' +
      (koLoss.winner.team?.displayName || '?') + ' — ' + fmtDay(koLoss.date);
    out.groups = [{ teamId: koLoss.winner.team?.id, date: koLoss.date }];
    return out;
  }
  // group-stage elimination: target made no knockout appearance
  const advanced = (awardsEvents || []).some(ev => {
    const slug = ev.season?.slug || '';
    if (slug === 'group-stage') return false;
    return (ev.competitions?.[0]?.competitors || []).some(c => c.team?.id === targetId);
  });
  const groupGames = M.filter(m => m.slug === 'group-stage' &&
    (m.h.team?.id === targetId || m.a.team?.id === targetId));
  if (!advanced && groupGames.length >= 3) {
    const beaters = groupGames.filter(m => m.loser?.team?.id === targetId)
      .map(m => ({ teamId: m.winner.team?.id, date: m.date }));
    out.awarded = true;
    out.detail = (teamIndex[targetId]?.name || '') + ' out at the group stage' +
      (beaters.length ? ' — shared among teams that beat them' : ' (no group-stage defeat)');
    out.groups = beaters;
  }
  return out;
}

function computeAwards() {
  const M = awardsCompleted();
  const ENG = resolveTeamId('England');
  const USA = resolveTeamId('USA');

  // World Cup Winner & Losing Finalist
  const finalM = M.find(m => m.slug === 'final');
  const winner = { key: 'winner', title: 'World Cup Winner',
    rule: 'Both holders of the World Cup winner (Shared Team decided by final-score tip).' };
  if (finalM && finalM.winner) {
    winner.awarded = true;
    winner.detail = (finalM.winner.team?.displayName || '') + ' — Final, ' + fmtDay(finalM.date);
    winner.groups = finalGroups(finalM.winner.team?.id);
  }
  const finalist = { key: 'finalist', title: 'Losing Finalist',
    rule: 'Both holders of the Final loser (Shared Team decided by final-score tip).' };
  if (finalM && finalM.loser) {
    finalist.awarded = true;
    finalist.detail = (finalM.loser.team?.displayName || '') + ' — Final, ' + fmtDay(finalM.date);
    finalist.groups = finalGroups(finalM.loser.team?.id);
  }

  // Punchin' — biggest upset by FIFA-ranking gap (1 Apr 2026); tie-breaks:
  // match goal difference, then winner goals, then ranking-height differential
  // (height = FIFA ranking position; the more the winner is ranked below the
  // opponent, the more negative the differential)
  let punch = null;
  M.forEach(m => {
    if (!m.winner || !m.loser) return;
    const wr = rankOf(m.winner.team?.id), lr = rankOf(m.loser.team?.id);
    if (wr >= 900 || lr >= 900 || wr <= lr) return;   // must be a resolved upset
    const cand = { m, diff: wr - lr, gd: m.margin, wg: m.winnerGoals, hdiff: lr - wr };
    if (!punch) { punch = cand; return; }
    const better =
      cand.diff > punch.diff ||
      (cand.diff === punch.diff && (
        cand.gd > punch.gd ||
        (cand.gd === punch.gd && (
          cand.wg > punch.wg ||
          (cand.wg === punch.wg && cand.hdiff < punch.hdiff)))));   // most negative wins
    if (better) punch = cand;
  });
  const punchAward = { key: 'punch', title: "Punchin'", preliminary: true,
    prelimNote: 'Preliminary — stands until a bigger upset is recorded.',
    rule: 'Biggest upset victory by FIFA-ranking gap (positions as at 1 April 2026).' };
  if (punch) {
    punchAward.awarded = true;
    punchAward.detail = punch.m.label + ' — ' + fmtDay(punch.m.date) + ' (rank gap ' + punch.diff + ')';
    punchAward.groups = withResolved([{ teamId: punch.m.winner.team?.id, date: punch.m.date }], 'punch');
  }

  // Biggest Loser — heaviest defeat; tie-break: margin, then fewest goals by loser
  let worst = null;
  M.forEach(m => {
    if (!m.loser) return;
    const cand = { m, margin: m.margin, lg: m.loserGoals };
    if (!worst || cand.margin > worst.margin ||
        (cand.margin === worst.margin && cand.lg < worst.lg)) worst = cand;
  });
  const bl = { key: 'bigloss', title: 'Biggest Loser', preliminary: true,
    prelimNote: 'Preliminary — stands until a heavier defeat is recorded.',
    rule: 'Heaviest defeat in a single match (greatest losing margin).' };
  if (worst) {
    bl.awarded = true;
    bl.detail = worst.m.label + ' — ' + fmtDay(worst.m.date) + ' (' + worst.margin + '-goal margin)';
    bl.groups = withResolved([{ teamId: worst.m.loser.team?.id, date: worst.m.date }], 'bigloss');
  }

  // The Doh — team that concedes the first own goal (summary scan)
  const doh = { key: 'doh', title: 'The "Doh"',
    rule: 'The team that concedes the first own goal of the tournament.' };
  if (dohResult) {
    doh.awarded = true; doh.detail = dohResult.detail;
    doh.groups = withResolved([{ teamId: dohResult.teamId, date: dohResult.date }], 'doh');
  } else if (!summaryScan.done) doh.scanning = true;

  // Soccer Sucks — first 0–0 (KO 0–0 after regulation also qualifies); both teams
  const ss = M.find(m => m.hs === 0 && m.as === 0);
  const ssAward = { key: 'soccersucks', title: 'Soccer Sucks',
    rule: 'The two teams in the first 0–0 of the tournament — prize split between them.' };
  if (ss) {
    ssAward.awarded = true;
    ssAward.detail = ss.label + ' — ' + fmtDay(ss.date);
    ssAward.groups = withResolved([
      { teamId: ss.h.team?.id, date: ss.date }, { teamId: ss.a.team?.id, date: ss.date }
    ], 'soccersucks');
  }

  // Going Home — eliminate England
  const gh = eliminationAward(ENG, { championNote: 'added to the World Cup Winner prize', foldToWinner: true });
  const ghAward = { key: 'goinghome', title: 'Going Home',
    rule: 'For eliminating England (shared among group-stage conquerors if England fall early).' };
  Object.assign(ghAward, gh);
  if (gh.awarded && gh.groups?.length) {
    ghAward.groups = gh.special
      ? gh.groups.map(g => finalGroups(g.teamId)[0])
      : withResolved(gh.groups, 'goinghome');
  }

  // Nobel Peace Prize — eliminate USA
  const nb = eliminationAward(USA, { championNote: 'donated to the UN Human Rights Office', foldToWinner: false });
  const nbAward = { key: 'nobel', title: 'Nobel Peace Prize',
    rule: 'For eliminating the USA (shared among group-stage conquerors if the USA fall early).' };
  Object.assign(nbAward, nb);
  if (nb.awarded && nb.groups?.length) nbAward.groups = withResolved(nb.groups, 'nobel');

  return [winner, finalist, punchAward, bl, doh, ssAward, ghAward, nbAward];
}

function regChip(r) {
  const lbl = r.role === 'dud' ? ' (Sh*t)' : ' (Golden)';
  if (r.won) {
    return '<span class="aw-chip' + (r.role === 'dud' ? ' dud' : '') + '" title="' +
      esc(r.note || '') + '">' + esc(r.member) + lbl + '</span>';
  }
  return '<span class="aw-chip lost" title="' + esc(r.note || '') + '">' +
    esc(r.member) + lbl + ' — loses tie-break</span>';
}

/* Manually entered award winners from the Google Sheet "Awards" tab. Keyed by a
   normalised award name so it matches either the award key or its title. When an
   award has manual winners they override the auto-computed result. */
let awardOverrides = store.get('wc26.awardOverrides', {});
if (!awardOverrides || typeof awardOverrides !== 'object') awardOverrides = {};
function awNorm(s) { return String(s || '').toLowerCase().replace(/[^a-z0-9]/g, ''); }
async function loadManualAwards() {
  if (!PREDICTIONS_WEBAPP_URL) return;
  try {
    const res = await fetch(PREDICTIONS_WEBAPP_URL + (PREDICTIONS_WEBAPP_URL.includes('?') ? '&' : '?') + 'action=awards', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (Array.isArray(rows)) {
      const map = {};
      rows.forEach((r, i) => {
        if (!r || !r.award) return;
        map[awNorm(r.award)] = { award: r.award, winners: r.winners || '', detail: r.detail || '', order: i };
      });
      awardOverrides = map;
      store.set('wc26.awardOverrides', awardOverrides);
      renderAwards();
    }
  } catch (e) { /* keep the cached copy */ }
}
function overrideFor(aw) {
  return awardOverrides[awNorm(aw.key)] || awardOverrides[awNorm(aw.title)] || null;
}
function winnerChips(text) {
  return String(text).split(/[;\n]+/).map(s => s.trim()).filter(Boolean)
    .map(s => '<span class="aw-chip">' + esc(s) + '</span>').join('');
}

/* Gold glittery confetti, fired once when Awards is opened and a prize is won. */
let awardsConfettiPending = false;
function fireConfetti() {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  const golds = ['#E8B84B', '#FFD56B', '#F6C453', '#FFE08A', '#D9A93A', '#FFFFFF'];
  const N = 110;
  for (let i = 0; i < N; i++) {
    const b = document.createElement('div');
    b.className = 'confetti-bit';
    const size = 5 + Math.random() * 8;
    const fall = 2.4 + Math.random() * 2.4;
    const delay = Math.random() * 1.1;
    b.style.left = (Math.random() * 100) + '%';
    b.style.width = size + 'px';
    b.style.height = (size * (0.45 + Math.random() * 0.9)) + 'px';
    b.style.background = golds[(Math.random() * golds.length) | 0];
    b.style.borderRadius = Math.random() < 0.4 ? '50%' : '2px';
    b.style.boxShadow = '0 0 ' + (2 + Math.random() * 5) + 'px rgba(255,210,90,0.85)';
    b.style.animation = 'confettiFall ' + fall + 's cubic-bezier(.2,.6,.45,1) ' + delay + 's forwards, ' +
      'confettiShimmer ' + (0.4 + Math.random() * 0.7) + 's ease-in-out ' + delay + 's infinite';
    layer.appendChild(b);
  }
  document.body.appendChild(layer);
  setTimeout(() => layer.remove(), 6500);
}

function renderAwards() {
  const wrap = document.getElementById('awardsWrap');
  if (!awardsEvents) { wrap.innerHTML = '<div class="empty">Loading match results…</div>'; return; }
  const awards = computeAwards();
  const usedOverrides = new Set();
  let html = awards.map(aw => {
    const ov = overrideFor(aw);
    const manual = ov && ov.winners.trim();
    let body, awarded, badge;
    if (manual) {
      usedOverrides.add(awNorm(ov.award));
      awarded = true;
      badge = '<span class="aw-badge">Awarded</span>';
      body = (ov.detail ? '<div class="aw-detail">' + esc(ov.detail) + '</div>' : '') +
        '<div class="aw-team">' + winnerChips(ov.winners) + '</div>';
    } else if (aw.awarded) {
      awarded = true;
      badge = aw.preliminary ? '<span class="aw-badge prelim">Leading</span>' : '<span class="aw-badge">Awarded</span>';
      const teamsHtml = (aw.groups || []).map(g => {
        const chips = g.regs.length
          ? g.regs.map(regChip).join('')
          : '<span class="aw-none">no Hoogies registrant</span>';
        return '<div class="aw-team"><span class="aw-team-name">' + esc(g.teamName) + '</span>' + chips + '</div>';
      }).join('');
      body = (aw.preliminary ? '<div class="aw-prelim-note">' + esc(aw.prelimNote || 'Preliminary — can still change.') + '</div>' : '') +
        '<div class="aw-detail">' + esc(aw.detail || '') + '</div>' + teamsHtml;
    } else if (aw.scanning) {
      awarded = false; badge = '';
      body = '<div class="aw-status scanning">Checking match events…</div>';
    } else {
      awarded = false; badge = '';
      body = '<div class="aw-status">Not yet awarded</div>';
    }
    return '<div class="aw-card' + (awarded ? ' won' : '') + '">' +
      '<div class="aw-head"><span class="aw-title">' + esc(aw.title) + '</span>' + badge + '</div>' +
      '<div class="aw-rule">' + esc(aw.rule) + '</div>' +
      body +
    '</div>';
  }).join('');

  // Any manual award rows that didn't match a known award become their own cards.
  const extras = Object.values(awardOverrides)
    .filter(ov => ov.winners.trim() && !usedOverrides.has(awNorm(ov.award)))
    .sort((a, b) => a.order - b.order);
  html += extras.map(ov =>
    '<div class="aw-card won">' +
      '<div class="aw-head"><span class="aw-title">' + esc(ov.award) + '</span><span class="aw-badge">Awarded</span></div>' +
      (ov.detail ? '<div class="aw-detail">' + esc(ov.detail) + '</div>' : '') +
      '<div class="aw-team">' + winnerChips(ov.winners) + '</div>' +
    '</div>').join('');

  wrap.innerHTML = html;

  // A prize has been won → celebrate once when the tab is opened.
  const anyAwarded = extras.length > 0 ||
    awards.some(aw => (overrideFor(aw)?.winners || '').trim() || aw.awarded);
  if (awardsConfettiPending && anyAwarded && currentTab === 'Awards') {
    awardsConfettiPending = false;
    fireConfetti();
  }
}

async function scanSummaries() {
  if (summaryScan.running || summaryScan.done || dohResult) { if (dohResult) summaryScan.done = true; return; }
  summaryScan.running = true;
  const M = awardsCompleted();
  let count = 0;
  for (const m of M) {
    if (dohResult) break;
    if (count++ > 90) break;   // cap fetches so we never hammer the feed
    try {
      const res = await fetch(SUMMARY_URL + encodeURIComponent(m.id));
      if (!res.ok) continue;
      const d = await res.json();
      const ke = d.keyEvents || [];
      for (const e of ke) {
        const t = (e.type?.text || '').toLowerCase();
        if (t.includes('own goal')) {
          dohResult = { teamId: e.team?.id, date: m.date,
            detail: (teamIndex[e.team?.id]?.name || e.team?.displayName || 'Own goal') +
              ' conceded — ' + m.label + ', ' + fmtDay(m.date) };
          break;
        }
      }
    } catch (e) { /* skip this match */ }
  }
  summaryScan.running = false;
  if (dohResult || count > 90) summaryScan.done = true;
  renderAwards();
}

/* Fetch every tournament fixture once (group + knockout); shared by Awards and Polls */
async function loadFixtures() {
  if (awardsEvents) return awardsEvents;
  const merged = {};
  for (const range of ['20260611-20260628', '20260628-20260720']) {
    try {
      const res = await fetch(BASE_URL + '?dates=' + range + '&limit=500');
      if (!res.ok) continue;
      const d = await res.json();
      (d.events || []).forEach(ev => { merged[ev.id] = ev; });
    } catch (e) { /* try the other range */ }
  }
  awardsEvents = Object.values(merged);
  return awardsEvents;
}

async function loadAwards() {
  renderAwards();
  loadPredictions();
  loadManualAwards();
  if (!awardsEvents) await loadFixtures();
  if (!awardsEvents.length) {
    document.getElementById('awardsWrap').innerHTML =
      '<div class="error-box">Could not load awards data. It will retry when you reopen this tab.</div>';
    awardsEvents = null;   // allow a retry next open
    return;
  }
  renderAwards();
  renderFinalPredictions();
  scanSummaries();
}
document.getElementById('predPanel').addEventListener('input', onPredInput);

/* ---------- Boot ---------- */

updateDateLabel();
paintCompFilter();
populateMemberFilter();
loadCalendarMonth();
loadStandings();
load();
</script>
