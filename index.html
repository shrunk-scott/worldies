<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070b12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>World Cup 2026 — Live Scores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b12;
  --panel: rgba(15, 24, 36, 0.88);
  --panel-2: rgba(21, 34, 47, 0.9);
  --line: #1f3142;
  --text: #eef4f9;
  --muted: #7e93a6;
  --pitch: #2fbf71;
  --live: #ff4655;
  --gold: #e8b84b;
  --input: rgba(255, 255, 255, 0.08);
  --input-focus: rgba(255, 255, 255, 0.12);
  --scrollbar: rgba(126, 147, 166, 0.3);
  --scrollbar-thumb: rgba(126, 147, 166, 0.6);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', system-ui, sans-serif;
  min-height: 100vh;
  padding-bottom: 70px;
  overflow-x: hidden;
}

::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

::-webkit-scrollbar-track {
  background: transparent;
}

::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(126, 147, 166, 0.8);
}

header {
  background: linear-gradient(180deg, rgba(11, 18, 28, 0.92) 0%, rgba(7, 11, 18, 0.75) 100%);
  border-bottom: 1px solid var(--line);
  padding: 22px 20px 18px;
  backdrop-filter: blur(2px);
  position: sticky;
  top: 0;
  z-index: 40;
}

h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 32px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  text-align: center;
}

h1 .accent {
  color: var(--pitch);
}

.tabs {
  max-width: 100%;
  display: flex;
  gap: 2px;
  overflow-x: auto;
  padding: 12px 20px;
  border-bottom: 1px solid var(--line);
  background: rgba(7, 11, 18, 0.5);
  position: sticky;
  top: 80px;
  z-index: 30;
  scroll-behavior: smooth;
}

.tabs::-webkit-scrollbar {
  height: 4px;
}

.tab-btn {
  background: var(--panel);
  border: 1px solid var(--line);
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 200ms ease;
  flex-shrink: 0;
}

.tab-btn:hover {
  border-color: rgba(47, 191, 113, 0.4);
  color: var(--text);
}

.tab-btn.active {
  color: var(--text);
  border-color: var(--pitch);
  background: rgba(47, 191, 113, 0.12);
}

main {
  max-width: 900px;
  margin: 0 auto;
  padding: 8px 20px 20px;
}

.view {
  display: none;
}

.view.active {
  display: block;
}

.match-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 200ms ease;
}

.match-card:hover {
  border-color: rgba(47, 191, 113, 0.3);
  background: rgba(15, 24, 36, 0.95);
}

.match-card.expanded {
  background: rgba(21, 34, 47, 0.9);
}

.match-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  font-weight: 500;
  font-size: 15px;
}

.match-team {
  flex: 1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.match-team-name {
  flex: 1;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.match-score {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 16px;
  min-width: 20px;
  text-align: right;
}

.match-state {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  min-width: 60px;
  text-align: center;
  padding: 4px 8px;
  background: rgba(126, 147, 166, 0.08);
  border-radius: 4px;
}

.match-state.live {
  color: var(--live);
  background: rgba(255, 70, 85, 0.12);
  animation: pulse-live 1.5s ease-in-out infinite;
}

.match-state.ft {
  color: var(--muted);
}

@keyframes pulse-live {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}

.match-details {
  border-top: 1px solid var(--line);
  margin-top: 12px;
  padding-top: 12px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all 250ms ease;
}

.match-card.expanded .match-details {
  max-height: 500px;
  opacity: 1;
}

.detail-event {
  display: flex;
  gap: 10px;
  align-items: baseline;
  font-size: 13px;
  padding: 5px 0;
  color: var(--text);
}

.detail-clock {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  color: var(--muted);
  min-width: 40px;
  font-size: 12px;
}

.detail-icon {
  width: 16px;
  text-align: center;
  flex-shrink: 0;
}

.detail-note {
  font-size: 12px;
  color: var(--muted);
  padding: 6px 0;
  font-style: italic;
}

.shootout-header {
  color: var(--gold);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 10px;
  padding: 8px 0 6px;
  border-top: 1px solid rgba(232, 184, 75, 0.2);
}

.group-table {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 14px;
}

.group-header {
  background: var(--panel-2);
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 16px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.table-row {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr 1fr;
  gap: 8px;
  padding: 10px 16px;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  align-items: center;
}

.table-row.header {
  background: rgba(126, 147, 166, 0.08);
  font-weight: 600;
  color: var(--muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.table-row:last-child {
  border-bottom: none;
}

.team-cell {
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.stat-cell {
  text-align: center;
  font-weight: 500;
}

.bracket-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
  padding: 0 0 40px 0;
}

.bracket-round {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
}

.bracket-match {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  font-size: 13px;
}

.bracket-team {
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}

.bracket-team:last-child {
  border-bottom: none;
}

.bracket-team-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bracket-score {
  font-weight: 600;
  min-width: 20px;
  text-align: right;
}

.bracket-winner .bracket-team {
  background: rgba(47, 191, 113, 0.1);
}

.bracket-winner .bracket-score {
  color: var(--pitch);
  font-weight: 700;
}

.bracket-status {
  padding: 6px 12px;
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  background: rgba(126, 147, 166, 0.08);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.sweeps-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 640px) {
  .sweeps-container {
    grid-template-columns: 1fr;
  }
}

.league-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
}

.league-header {
  background: var(--panel-2);
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 18px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.league-entry {
  padding: 10px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
}

.league-entry:last-child {
  border-bottom: none;
}

.league-rank {
  min-width: 30px;
  font-weight: 600;
  color: var(--muted);
}

.league-name {
  flex: 1;
  margin-left: 12px;
}

.league-points {
  font-weight: 600;
  color: var(--pitch);
  min-width: 40px;
  text-align: right;
}

.league-team {
  font-size: 11px;
  color: var(--muted);
  margin-left: 42px;
  margin-top: 2px;
}

.awards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
}

.award-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px;
  text-align: center;
}

.award-icon {
  font-size: 40px;
  margin-bottom: 10px;
}

.award-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.award-winner {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.award-stat {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}

.polls-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

.poll-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px;
}

.poll-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 12px;
  color: var(--text);
}

.poll-option {
  margin-bottom: 10px;
}

.poll-option-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 4px;
  color: var(--muted);
}

.poll-bar {
  background: rgba(126, 147, 166, 0.15);
  height: 20px;
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.poll-bar-fill {
  background: var(--pitch);
  height: 100%;
  transition: width 300ms ease;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding-right: 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--bg);
}

.empty {
  background: var(--panel);
  border: 1px dashed var(--line);
  border-radius: 10px;
  padding: 40px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  margin-top: 20px;
}

.error-box {
  background: rgba(255, 70, 85, 0.08);
  border: 1px solid rgba(255, 70, 85, 0.3);
  border-radius: 10px;
  padding: 40px 20px;
  text-align: center;
  color: #f1a0a8;
  font-size: 13px;
  margin-top: 20px;
}

.loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}

.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid var(--line);
  border-top-color: var(--pitch);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Mobile fixes */
@media (max-width: 600px) {
  h1 {
    font-size: 24px;
  }

  main {
    padding: 8px 14px 20px;
  }

  .match-header {
    flex-direction: column;
    gap: 8px;
  }

  .match-team {
    width: 100%;
    flex-direction: row;
  }

  .table-row {
    grid-template-columns: 1.5fr 0.8fr 0.8fr 0.8fr 0.8fr 0.8fr;
    padding: 8px 12px;
  }

  .sweeps-container {
    grid-template-columns: 1fr;
  }

  .awards-grid {
    grid-template-columns: 1fr;
  }

  .polls-container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<header>
<h1>World Cup <span class="accent">2026</span></h1>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="matches">Matches</button>
  <button class="tab-btn" data-tab="groups">Groups</button>
  <button class="tab-btn" data-tab="bracket">Bracket</button>
  <button class="tab-btn" data-tab="sweeps">Sweeps</button>
  <button class="tab-btn" data-tab="awards">Awards</button>
  <button class="tab-btn" data-tab="polls">Polls</button>
</div>

<div id="matches" class="view active"><main id="matches-content"><div class="loading"><div class="spinner"></div>Loading scores…</div></main></div>
<div id="groups" class="view"><main id="groups-content"><div class="loading"><div class="spinner"></div>Loading standings…</div></main></div>
<div id="bracket" class="view"><main id="bracket-content"><div class="loading"><div class="spinner"></div>Loading bracket…</div></main></div>
<div id="sweeps" class="view"><main id="sweeps-content"><div class="loading"><div class="spinner"></div>Loading sweeps…</div></main></div>
<div id="awards" class="view"><main id="awards-content"><div class="loading"><div class="spinner"></div>Loading awards…</div></main></div>
<div id="polls" class="view"><main id="polls-content"><div class="loading"><div class="spinner"></div>Loading polls…</div></main></div>

<script>

// ============ CONFIG ============
const BASE_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';
const SUMMARY_URL = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/summary?event=';
const STANDINGS_URL = 'https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings?season=2026';
const PREDICTIONS_WEBAPP_URL = 'https://script.google.com/macros/d/1P9vDQK8-R2-aH7K-UBKgVdB6VWzJxn-yP2KqnTfVJO8/usercache';

const ICON = {
  ball: '⚽',
  goal: '⚽',
  red: '🔴',
  yellow: '🟨'
};

// ============ STATE ============
let lastData = null;
let lastStandings = null;
let lastKnockouts = null;
let detailsCache = {};
let teamIndex = {};
let eliminated = {};
let koEvents = null;
let pollsData = {};
let sweepData = { top: [] };

const HOOGIES_DRAW = [
  { name: 'Scotty H', team: 'Argentina' },
  { name: 'Mark S', team: 'France' },
  { name: 'Nick M', team: 'England' },
  { name: 'Tom K', team: 'Spain' },
  { name: 'Lina L', team: 'Germany' },
  { name: 'Steve L', team: 'Netherlands' },
  { name: 'James P', team: 'Belgium' },
  { name: 'Sarah W', team: 'Portugal' },
  { name: 'Mike T', team: 'Italy' },
  { name: 'Chris D', team: 'Denmark' },
  { name: 'Alex R', team: 'Brazil' },
  { name: 'Emma H', team: 'Mexico' },
  { name: 'David L', team: 'Canada' },
  { name: 'Lisa K', team: 'Uruguay' },
  { name: 'Paul M', team: 'Colombia' },
  { name: 'Anna S', team: 'Argentina' },
  { name: 'John B', team: 'France' },
  { name: 'Rachel G', team: 'England' },
  { name: 'Tom H', team: 'Spain' },
  { name: 'Kelly M', team: 'Germany' },
  { name: 'Ryan T', team: 'Netherlands' },
  { name: 'Sophie J', team: 'Belgium' },
  { name: 'Matt W', team: 'Portugal' },
  { name: 'Laura D', team: 'Italy' },
  { name: 'Oliver K', team: 'Denmark' },
  { name: 'Victoria P', team: 'Brazil' },
  { name: 'Lucas F', team: 'Mexico' },
  { name: 'Mia R', team: 'Canada' },
  { name: 'Noah S', team: 'Uruguay' },
  { name: 'Ava L', team: 'Colombia' },
  { name: 'Ethan M', team: 'Argentina' },
  { name: 'Lily B', team: 'France' },
  { name: 'Mason C', team: 'England' },
  { name: 'Charlotte J', team: 'Spain' },
  { name: 'Liam H', team: 'Germany' },
  { name: 'Amelia W', team: 'Netherlands' },
  { name: 'Benjamin T', team: 'Belgium' },
  { name: 'Harper K', team: 'Portugal' },
  { name: 'Henry G', team: 'Italy' },
  { name: 'Evelyn M', team: 'Denmark' },
  { name: 'Alexander D', team: 'Brazil' },
  { name: 'Abigail R', team: 'Mexico' },
  { name: 'Michael P', team: 'Canada' }
];

const SHRUNK_DRAW = [
  { name: 'Scotty H', team: 'Argentina' },
  { name: 'Lina L', team: 'France' },
  { name: 'Steve L', team: 'England' },
  { name: 'Nick M', team: 'Spain' },
  { name: 'Tom K', team: 'Germany' }
];

// ============ UTILITIES ============
function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// BUG FIX 1: Shootout detection
function isShootoutEvent(e) {
  if (e.shootout === true) return true;
  const t = (e.type?.text || '').toLowerCase();
  if (t.includes('shootout')) return true;
  const clock = e.clock?.displayValue || '';
  if (t.includes('penalt') && (!clock || clock === '-' || clock === "0'")) return true;
  return false;
}

// ============ MATCHES ============
async function loadMatches() {
  try {
    const res = await fetch(BASE_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    lastData = await res.json();
    renderMatches();
  } catch (err) {
    document.getElementById('matches-content').innerHTML = '<div class="error-box">Error loading matches: ' + esc(err.message) + '</div>';
  }
}

async function loadDetails(eventId) {
  detailsCache[eventId] = 'loading';
  renderMatches();
  
  try {
    const res = await fetch(SUMMARY_URL + encodeURIComponent(eventId));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const events = data.keyEvents || [];
    
    // Regulation events
    const rows = events
      .filter(e => !isShootoutEvent(e))
      .filter(e => {
        const t = (e.type?.text || '').toLowerCase();
        return e.scoringPlay || e.redCard || e.yellowCard || t.includes('goal') || t.includes('card') || t.includes('penalty');
      })
      .map(e => {
        const t = (e.type?.text || '').toLowerCase();
        let icon = ICON.goal;
        if (e.redCard) icon = ICON.red;
        else if (e.yellowCard) icon = ICON.yellow;
        const who = (e.participants || []).map(p => p.athlete?.displayName).filter(Boolean).join(', ');
        const clock = e.clock?.displayValue || '';
        return '<div class="detail-event"><span class="detail-clock">' + esc(clock) + '</span><span class="detail-icon">' + icon + '</span><span>' + esc(who || e.text || '') + '</span></div>';
      });
    
    // Shootout events
    const soEvents = events.filter(isShootoutEvent);
    let shootoutHtml = '';
    
    if (soEvents.length) {
      const tally = {};
      const soRows = soEvents.map(e => {
        const t = (e.type?.text || '').toLowerCase();
        const missed = t.includes('miss') || t.includes('saved') || t.includes('blocked') || t.includes('post');
        const scored = !missed && (e.scoringPlay || t.includes('scored'));
        const who = (e.participants || []).map(p => p.athlete?.displayName).filter(Boolean).join(', ');
        const teamAbbr = e.team?.abbreviation || '';
        
        if (scored && teamAbbr) tally[teamAbbr] = (tally[teamAbbr] || 0) + 1;
        
        const icon = scored ? ICON.ball : '✕';
        const status = scored ? 'scored' : 'missed';
        return '<div class="detail-event"><span class="detail-clock">PK</span><span class="detail-icon">' + icon + '</span><span>' + esc(who) + ' (' + status + ')</span></div>';
      });
      
      const tallyLine = Object.keys(tally).length ? '<div class="detail-note">Shootout: ' + Object.keys(tally).map(k => k + ' ' + tally[k]).join(' – ') + '</div>' : '';
      shootoutHtml = '<div class="shootout-header">⭐ Penalty Shootout</div>' + tallyLine + soRows.join('');
    }
    
    detailsCache[eventId] = (rows.join('') + shootoutHtml) || '<div class="detail-note">No events recorded yet.</div>';
  } catch (err) {
    detailsCache[eventId] = '<div class="detail-note">Could not load match details.</div>';
  }
  
  renderMatches();
}

function renderMatches() {
  const content = document.getElementById('matches-content');
  if (!lastData) {
    content.innerHTML = '<div class="empty">No matches data.</div>';
    return;
  }
  
  const all = lastData.events || [];
  if (!all.length) {
    content.innerHTML = '<div class="empty">No matches scheduled.</div>';
    return;
  }
  
  let html = '';
  all.forEach(ev => {
    const comp = ev.competitions?.[0];
    if (!comp) return;
    
    const state = comp.status?.type?.state || 'pre';
    const comps = comp.competitors || [];
    const home = comps.find(c => c.homeAway === 'home') || comps[0];
    const away = comps.find(c => c.homeAway === 'away') || comps[1];
    
    if (!home || !away) return;
    
    let stateHtml = '';
    if (state === 'post') {
      const slug = ev.season?.slug || '';
      const ko = slug && slug !== 'group-stage';
      const level = home?.score != null && away?.score != null && String(home.score) === String(away.score);
      const winner = comps.find(c => c.winner);
      
      let pens = '';
      if (ko && level && winner) {
        const hSo = home?.shootoutScore;
        const aSo = away?.shootoutScore;
        if (hSo != null && aSo != null) {
          pens = '<span style="font-size:10px;color:var(--muted);margin-left:4px">' + esc(hSo) + '-' + esc(aSo) + ' pens</span>';
        } else {
          pens = '<span style="font-size:10px;color:var(--muted);margin-left:4px">won on pens</span>';
        }
      }
      stateHtml = '<span class="match-state ft">FT</span>' + pens;
    } else if (state === 'in') {
      const clock = comp.status?.displayClock || 'Live';
      stateHtml = '<span class="match-state live">' + esc(clock) + '</span>';
    } else {
      stateHtml = '<span class="match-state">KO</span>';
    }
    
    const details = detailsCache[ev.id] ? '<div class="match-details">' + (detailsCache[ev.id] === 'loading' ? '<div class="loading"><div class="spinner"></div></div>' : detailsCache[ev.id]) + '</div>' : '';
    
    const expanded = detailsCache[ev.id] ? ' expanded' : '';
    html += '<div class="match-card' + expanded + '" data-event-id="' + esc(ev.id) + '">' +
            '<div class="match-header">' +
            '<div class="match-team"><span class="match-team-name">' + esc(home.team?.displayName || '?') + '</span><span class="match-score">' + esc(home.score ?? '-') + '</span></div>' +
            stateHtml +
            '<div class="match-team"><span class="match-score">' + esc(away.score ?? '-') + '</span><span class="match-team-name">' + esc(away.team?.displayName || '?') + '</span></div>' +
            '</div>' + details + '</div>';
  });
  
  content.innerHTML = html || '<div class="empty">No matches to display.</div>';
}

document.addEventListener('click', (e) => {
  const card = e.target.closest('.match-card');
  if (!card) return;
  const id = card.dataset.eventId;
  
  if (card.classList.contains('expanded')) {
    card.classList.remove('expanded');
  } else {
    card.classList.add('expanded');
    if (!detailsCache[id]) loadDetails(id);
  }
});

// ============ GROUPS ============
async function loadGroups() {
  try {
    const res = await fetch(STANDINGS_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    lastStandings = await res.json();
    
    teamIndex = {};
    (lastStandings.children || []).forEach(g => {
      (g.standings?.entries || []).forEach(en => {
        if (en.team?.id) {
          const gp = en.stats?.find(s => s.name === 'gamesPlayed')?.displayValue || '0';
          teamIndex[en.team.id] = { name: en.team.displayName || en.team.name || '?', gp };
        }
      });
    });
    
    markGroupStageEliminations();
    renderGroups();
  } catch (err) {
    document.getElementById('groups-content').innerHTML = '<div class="error-box">Error loading standings: ' + esc(err.message) + '</div>';
  }
}

// BUG FIX 2: Mark group-stage eliminations
function markGroupStageEliminations() {
  if (!koEvents || !Object.keys(teamIndex).length) return;
  
  const koTeamIds = new Set();
  koEvents.forEach(ev => {
    if ((ev.season?.slug || '') === 'group-stage') return;
    (ev.competitions?.[0]?.competitors || []).forEach(c => {
      if (c.team?.id) koTeamIds.add(c.team.id);
    });
  });
  
  if (koTeamIds.size < 32) return;
  
  Object.keys(teamIndex).forEach(id => {
    const gp = Number(teamIndex[id].gp) || 0;
    if (gp >= 3 && !koTeamIds.has(id) && !eliminated[id]) {
      eliminated[id] = 'Groups';
    }
  });
}

function renderGroups() {
  const content = document.getElementById('groups-content');
  if (!lastStandings) {
    content.innerHTML = '<div class="empty">No standings data.</div>';
    return;
  }
  
  let html = '';
  (lastStandings.children || []).forEach(g => {
    if (!g.name || !g.standings?.entries?.length) return;
    
    html += '<div class="group-table"><div class="group-header">' + esc(g.name) + '</div>';
    html += '<div class="table-row header">' +
            '<div class="team-cell">Team</div>' +
            '<div class="stat-cell">GP</div>' +
            '<div class="stat-cell">W</div>' +
            '<div class="stat-cell">D</div>' +
            '<div class="stat-cell">L</div>' +
            '<div class="stat-cell">GD</div>' +
            '</div>';
    
    (g.standings.entries || []).forEach(en => {
      const teamId = en.team?.id;
      const gp = en.stats?.find(s => s.name === 'gamesPlayed')?.displayValue || '0';
      const w = en.stats?.find(s => s.name === 'wins')?.displayValue || '0';
      const d = en.stats?.find(s => s.name === 'draws')?.displayValue || '0';
      const l = en.stats?.find(s => s.name === 'losses')?.displayValue || '0';
      const gd = en.stats?.find(s => s.name === 'goalDifferential')?.displayValue || '0';
      
      let teamName = en.team?.displayName || en.team?.name || '?';
      let elim = eliminated[teamId];
      if (elim) teamName += ' <span style="color:var(--muted);font-size:11px;margin-left:6px">OUT ' + esc(elim) + '</span>';
      
      html += '<div class="table-row">' +
              '<div class="team-cell">' + teamName + '</div>' +
              '<div class="stat-cell">' + esc(gp) + '</div>' +
              '<div class="stat-cell">' + esc(w) + '</div>' +
              '<div class="stat-cell">' + esc(d) + '</div>' +
              '<div class="stat-cell">' + esc(l) + '</div>' +
              '<div class="stat-cell">' + esc(gd) + '</div>' +
              '</div>';
    });
    
    html += '</div>';
  });
  
  content.innerHTML = html || '<div class="empty">No group data.</div>';
}

// ============ BRACKET ============
async function loadBracket() {
  try {
    const res = await fetch(BASE_URL + '?dates=20260628-20260720&limit=400');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    koEvents = data.events || [];
    
    koEvents.forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp || comp.status?.type?.state !== 'post') return;
      
      const slug = ev.season?.slug || '';
      if (slug === 'group-stage') return;
      
      const comps = comp.competitors || [];
      const loser = comps.find(c => !c.winner);
      if (slug !== 'third-place-match' && loser?.team?.id) {
        eliminated[loser.team.id] = slug.replace(/-/g, ' ').toUpperCase();
      }
    });
    
    markGroupStageEliminations();
    renderBracket();
  } catch (err) {
    document.getElementById('bracket-content').innerHTML = '<div class="error-box">Error loading bracket: ' + esc(err.message) + '</div>';
  }
}

function renderBracket() {
  const content = document.getElementById('bracket-content');
  if (!koEvents || !koEvents.length) {
    content.innerHTML = '<div class="empty">No knockout fixtures scheduled yet.</div>';
    return;
  }
  
  const grouped = {};
  koEvents.forEach(ev => {
    const slug = ev.season?.slug || 'unknown';
    if (!grouped[slug]) grouped[slug] = [];
    grouped[slug].push(ev);
  });
  
  let html = '<div class="bracket-container">';
  
  Object.keys(grouped).sort().reverse().forEach(slug => {
    const matches = grouped[slug];
    if (!matches.length) return;
    
    let title = slug.replace(/-/g, ' ').toUpperCase();
    if (title.includes('ROUND OF')) title = 'Round of ' + title.split(' ')[2];
    
    html += '<h3 style="font-family:Barlow Condensed,sans-serif;font-weight:600;font-size:16px;letter-spacing:0.08em;text-transform:uppercase;margin:20px 0 12px;color:var(--muted)">' + esc(title) + '</h3>';
    html += '<div class="bracket-round">';
    
    matches.forEach(ev => {
      const comp = ev.competitions?.[0];
      if (!comp) return;
      
      const state = comp.status?.type?.state || 'pre';
      const comps = comp.competitors || [];
      const home = comps.find(c => c.homeAway === 'home') || comps[0];
      const away = comps.find(c => c.homeAway === 'away') || comps[1];
      
      if (!home || !away) return;
      
      const isPost = state === 'post';
      const classStr = (home.winner || away.winner) ? ' bracket-winner' : '';
      
      html += '<div class="bracket-match' + classStr + '">' +
              '<div class="bracket-team' + (home.winner ? ' ' : '') + '">' +
              '<span class="bracket-team-name">' + esc(home.team?.displayName || '?') + '</span>' +
              '<span class="bracket-score">' + esc(home.score ?? '-') + '</span>' +
              '</div>' +
              '<div class="bracket-team' + (away.winner ? ' ' : '') + '">' +
              '<span class="bracket-team-name">' + esc(away.team?.displayName || '?') + '</span>' +
              '<span class="bracket-score">' + esc(away.score ?? '-') + '</span>' +
              '</div>';
      
      if (!isPost) {
        const kTime = ev.date ? new Date(ev.date).toLocaleString('en-AU', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : 'TBD';
        html += '<div class="bracket-status">' + esc(kTime) + '</div>';
      }
      
      html += '</div>';
    });
    
    html += '</div>';
  });
  
  html += '</div>';
  content.innerHTML = html || '<div class="empty">No knockout data.</div>';
}

// ============ SWEEPS ============
function renderSweeps() {
  const content = document.getElementById('sweeps-content');
  
  let html = '<div class="sweeps-container">';
  
  // Hoogies
  const hPoints = {};
  HOOGIES_DRAW.forEach(entry => {
    const team = entry.team;
    const score = (function() {
      // Calculate points based on team progress
      let pts = 0;
      
      // Check group stage status
      const groupStageTeam = Object.keys(teamIndex).find(id => {
        const tidx = teamIndex[id];
        return tidx.name.includes(team);
      });
      
      if (!eliminated[groupStageTeam] && groupStageTeam && Number(teamIndex[groupStageTeam].gp) >= 3) {
        pts += 3; // Made knockouts
      }
      
      // Check knockout progress
      if (koEvents) {
        koEvents.forEach(ev => {
          const comps = ev.competitions?.[0]?.competitors || [];
          const winner = comps.find(c => c.winner);
          if (winner?.team?.displayName?.includes(team)) {
            const slug = ev.season?.slug || '';
            if (slug.includes('round-of-16')) pts += 10;
            else if (slug.includes('quarter')) pts += 20;
            else if (slug.includes('semi')) pts += 50;
            else if (slug.includes('final') && !slug.includes('third')) pts += 100;
          }
        });
      }
      
      return pts;
    })();
    
    hPoints[entry.name] = score;
  });
  
  const hSorted = Object.entries(hPoints).sort((a, b) => b[1] - a[1]);
  html += '<div class="league-card"><div class="league-header">Hoogies (' + hSorted.length + ')</div>';
  hSorted.slice(0, 15).forEach((entry, idx) => {
    html += '<div class="league-entry">' +
            '<div class="league-rank">' + (idx + 1) + '.</div>' +
            '<div class="league-name">' + esc(entry[0]) + '</div>' +
            '<div class="league-points">' + entry[1] + '</div>' +
            '</div>' +
            '<div class="league-team">' + esc(HOOGIES_DRAW.find(e => e.name === entry[0])?.team || '') + '</div>';
  });
  html += '</div>';
  
  // Shrunk
  const sPoints = {};
  SHRUNK_DRAW.forEach(entry => {
    sPoints[entry.name] = hPoints[entry.name] || 0;
  });
  
  const sSorted = Object.entries(sPoints).sort((a, b) => b[1] - a[1]);
  html += '<div class="league-card"><div class="league-header">Shrunk (5)</div>';
  sSorted.forEach((entry, idx) => {
    html += '<div class="league-entry">' +
            '<div class="league-rank">' + (idx + 1) + '.</div>' +
            '<div class="league-name">' + esc(entry[0]) + '</div>' +
            '<div class="league-points">' + entry[1] + '</div>' +
            '</div>' +
            '<div class="league-team">' + esc(SHRUNK_DRAW.find(e => e.name === entry[0])?.team || '') + '</div>';
  });
  html += '</div>';
  
  html += '</div>';
  document.getElementById('sweeps-content').innerHTML = html;
}

// ============ POLLS ============
function renderPolls() {
  const content = document.getElementById('polls-content');
  
  let html = '<div class="polls-container">';
  
  const samplePolls = [
    { question: 'Which team will win it all?', options: [
      { label: 'Argentina', votes: 142 },
      { label: 'France', votes: 138 },
      { label: 'England', votes: 96 },
      { label: 'Other', votes: 124 }
    ]},
    { question: 'Biggest surprise so far?', options: [
      { label: 'Canada', votes: 89 },
      { label: 'Morocco', votes: 76 },
      { label: 'USA', votes: 63 },
      { label: 'None yet', votes: 172 }
    ]},
    { question: 'Best match of the tournament?', options: [
      { label: 'ARG vs FRA', votes: 287 },
      { label: 'ENG vs ESP', votes: 156 },
      { label: 'GER vs ITA', votes: 124 },
      { label: 'BRA vs NED', votes: 93 }
    ]}
  ];
  
  samplePolls.forEach(poll => {
    const totalVotes = poll.options.reduce((s, o) => s + o.votes, 0);
    html += '<div class="poll-card">' +
            '<div class="poll-title">' + esc(poll.question) + '</div>';
    
    poll.options.forEach(opt => {
      const pct = totalVotes ? Math.round(opt.votes / totalVotes * 100) : 0;
      html += '<div class="poll-option">' +
              '<div class="poll-option-label"><span>' + esc(opt.label) + '</span><span>' + pct + '%</span></div>' +
              '<div class="poll-bar"><div class="poll-bar-fill" style="width:' + pct + '%">' + (pct > 20 ? pct : '') + '</div></div>' +
              '</div>';
    });
    
    html += '<div class="detail-note" style="margin-top:10px">Total votes: ' + totalVotes + '</div>' +
            '</div>';
  });
  
  html += '</div>';
  content.innerHTML = html;
}

// ============ TAB SWITCHING ============
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabName = btn.dataset.tab;
    
    // Update active states
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(tabName).classList.add('active');
    
    // Load data for this tab
    if (tabName === 'matches') loadMatches();
    else if (tabName === 'groups') loadGroups();
    else if (tabName === 'bracket') loadBracket();
    else if (tabName === 'sweeps') renderSweeps();
    else if (tabName === 'awards') renderAwards();
    else if (tabName === 'polls') renderPolls();
  });
});

// ============ INIT ============
window.addEventListener('load', () => {
  loadMatches();
  loadGroups();
  renderAwards();
  renderPolls();
});

</script>
